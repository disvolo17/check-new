<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denis - PM Dubai Action Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; }
        #lives { color: #ff0000; font-size: 20px; text-shadow: 2px 2px #000; }
        #joke-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: #0f0; display: none; align-items: center; justify-content: center; text-align: center; font-size: 22px; padding: 40px; z-index: 100; text-transform: uppercase; line-height: 1.6; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="lives">ЖИЗНИ: ♥♥♥</div>
</div>
<div id="joke-overlay">АНЕКДОТ</div>
<canvas id="game"></canvas>

<script>
window.addEventListener("load", () => {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const jokeOverlay = document.getElementById("joke-overlay");

    const jokes = [
        "ПРОДЖЕКТ-МЕНЕДЖЕР — ЧЕЛОВЕК, КОТОРЫЙ УВЕРЕН, ЧТО 9 ЖЕНЩИН РОДЯТ ЗА МЕСЯЦ!",
        "ЗАКАЗЧИК: 'НУЖНО ВЧЕРА'. ПМ: 'ВОТ ВАМ СЧЕТ ИЗ БУДУЩЕГО!'",
        "БЭКЛОГ — ЭТО КЛАДБИЩЕ ИДЕЙ, КОТОРЫЕ УБИЛ БЮДЖЕТ!"
    ];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function load(src) {
        return new Promise(res => {
            const img = new Image();
            img.src = src;
            img.onload = () => res(img);
            img.onerror = () => res(null);
        });
    }

    (async function() {
        const sprites = {
            idle: await load("player.png") || await load("idle.png"),
            little: await load("Little.png"),
            big: await load("big.png")
        };

        const GROUND_Y = canvas.height - 120;

        let player = {
            x: 100, y: GROUND_Y - 130, w: 75, h: 130, 
            vx: 0, vy: 0, accel: 0.6, friction: 0.85, maxSpeed: 7, gravity: 0.8, jumpPower: -17,
            grounded: false, jumps: 0, maxJumps: 2, dir: 1, lives: 3
        };

        // 5 МАЛЕНЬКИХ ВРАГОВ - ТЕПЕРЬ ОНИ БЛИЖЕ К НАЧАЛУ
        let enemies = [
            { x: 600, y: GROUND_Y - 60, w: 60, h: 60, vx: -2.5, alive: true },
            { x: 1200, y: GROUND_Y - 60, w: 60, h: 60, vx: -2.5, alive: true },
            { x: 1800, y: GROUND_Y - 60, w: 60, h: 60, vx: -2.5, alive: true },
            { x: 2500, y: GROUND_Y - 60, w: 60, h: 60, vx: -2.5, alive: true },
            { x: 3200, y: GROUND_Y - 60, w: 60, h: 60, vx: -2.5, alive: true }
        ];

        let jokeBlocks = [
            { x: 400, y: GROUND_Y - 250, hit: false },
            { x: 1000, y: GROUND_Y - 300, hit: false },
            { x: 2000, y: GROUND_Y - 250, hit: false }
        ];

        let lerpCameraX = 0;
        let keys = { a: false, d: false };

        window.onkeydown = (e) => {
            if (e.code === "KeyA") keys.a = true;
            if (e.code === "KeyD") keys.d = true;
            if (e.code === "KeyW" && player.jumps < player.maxJumps) {
                player.vy = player.jumpPower; player.jumps++;
            }
        };
        window.onkeyup = (e) => {
            if (e.code === "KeyA") keys.a = false;
            if (e.code === "KeyD") keys.d = false;
        };

        function update() {
            if (keys.a) { player.vx -= player.accel; player.dir = -1; }
            else if (keys.d) { player.vx += player.accel; player.dir = 1; }
            else { player.vx *= player.friction; }

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.y + player.h > GROUND_Y) {
                player.y = GROUND_Y - player.h;
                player.vy = 0; player.jumps = 0;
            }

            // Удары по кубикам
            jokeBlocks.forEach(b => {
                if (!b.hit && player.x + player.w > b.x && player.x < b.x + 80 && player.vy < 0 && player.y < b.y + 80 && player.y > b.y) {
                    b.hit = true; player.vy = 5;
                    jokeOverlay.innerText = jokes[Math.floor(Math.random() * jokes.length)];
                    jokeOverlay.style.display = "flex";
                    setTimeout(() => jokeOverlay.style.display = "none", 3000);
                }
            });

            // Логика врагов Little
            enemies.forEach(en => {
                if (!en.alive) return;
                en.x += en.vx;
                // Границы патрулирования
                if (en.x < 100 || en.x > 4000) en.vx *= -1;

                // Столкновение с игроком
                if (player.x < en.x + en.w && player.x + player.w > en.x && player.y < en.y + en.h && player.y + player.h > en.y) {
                    player.lives--;
                    player.x -= 200; // Отбросить назад
                    document.getElementById("lives").innerText = "ЖИЗНИ: " + "♥".repeat(Math.max(0, player.lives));
                    if (player.lives <= 0) location.reload();
                }
            });

            let targetCam = player.x - canvas.width / 3;
            lerpCameraX += (targetCam - lerpCameraX) * 0.1;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ПОЛ
            ctx.fillStyle = "#3d2516";
            ctx.fillRect(0, GROUND_Y, canvas.width, 120);
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(0, GROUND_Y, canvas.width, 15);

            // КУБИКИ
            jokeBlocks.forEach(b => {
                ctx.fillStyle = b.hit ? "#333" : "#f1c40f";
                ctx.fillRect(b.x - lerpCameraX, b.y, 80, 80);
                if(!b.hit) {
                    ctx.fillStyle = "#000";
                    ctx.font = "bold 10px Arial";
                    ctx.fillText("УДАРЬ", b.x - lerpCameraX + 15, b.y + 35);
                    ctx.fillText("МЕНЯ", b.x - lerpCameraX + 18, b.y + 55);
                }
            });

            // ВРАГИ LITTLE (Рисуем картинку или фиолетовый квадрат, если картинки нет)
            enemies.forEach(en => {
                if (!en.alive) return;
                if (sprites.little) {
                    ctx.drawImage(sprites.little, en.x - lerpCameraX, en.y, en.w, en.h);
                } else {
                    ctx.fillStyle = "purple";
                    ctx.fillRect(en.x - lerpCameraX, en.y, en.w, en.h);
                }
            });

            // ИГРОК
            ctx.save();
            if (player.dir === -1) {
                ctx.translate(player.x - lerpCameraX + player.w, player.y);
                ctx.scale(-1, 1);
                ctx.drawImage(sprites.idle || new Image(), 0, 0, player.w, player.h);
            } else {
                ctx.drawImage(sprites.idle || new Image(), player.x - lerpCameraX, player.y, player.w, player.h);
            }
            ctx.restore();

            requestAnimationFrame(draw);
        }
        setInterval(update, 1000/60); 
        draw();
    })();
});
</script>
</body>
</html>
