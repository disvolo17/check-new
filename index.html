<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sims Avatar UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 🎥 AVATAR -->
  <div id="avatar">
    <video id="video" autoplay playsinline></video>
    <div id="faceOverlay"></div>
  </div>

  <!-- 💚 PLUMBOB -->
  <div id="plumbob"></div>

  <!-- 🎯 AIM -->
  <div id="aim"></div>

  <!-- 💬 THOUGHT -->
  <div id="thought"></div>

  <!-- 🟢 CARDS -->
  <div class="card left">Experience</div>
  <div class="card right">About</div>
  <div class="card up">Contacts</div>
  <div class="card down">Skills</div>

  <!-- ⭕ MENU -->
  <div id="radialMenu"></div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script src="app.js"></script>
</body>
</html>
