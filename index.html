<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denis - PM Dubai Action Game (Крис)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; touch-action: manipulation; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; }
        #lives { color: #ff0000; font-size: 20px; text-shadow: 2px 2px #000; }
        #boss-bar { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 300px; height: 15px; border: 3px solid #fff; display: none; background: #222; }
        #boss-hp { width: 100%; height: 100%; background: #f00; transition: width 0.2s; }
        #joke-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.6); color: #00ff00; display: none; 
            align-items: center; justify-content: center; text-align: center; 
            font-size: 24px; padding: 40px; z-index: 100; text-transform: uppercase; line-height: 1.6;
            text-shadow: 2px 2px 0 #000;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="lives">ЖИЗНИ: ♥♥♥</div>
    <div id="boss-bar"><div id="boss-hp"></div></div>
</div>
<div id="joke-overlay">АНЕКДОТ</div>
<canvas id="game"></canvas>

<script>
window.addEventListener("load", () => {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const jokeOverlay = document.getElementById("joke-overlay");

    const jokes = [
        "ПРОДЖЕКТ-МЕНЕДЖЕР — ЭТО ЧЕЛОВЕК, КОТОРЫЙ СЧИТАЕТ, ЧТО 9 ЖЕНЩИН МОГУТ РОДИТЬ РЕБЕНКА ЗА МЕСЯЦ!",
        "ЗАКАЗЧИК: 'МЫ ХОТИМ ВСЁ И ВЧЕРА'. ПМ: 'ВОТ ВАМ СЧЕТ И ГАЛЛЮЦИНАЦИЯ БЭКЛОГА!'",
        "ДЕБАТЫ ПМ-А: 'МЫ НЕ ОПАЗДЫВАЕМ, МЫ ПРОСТО ПЕРЕОСМЫСЛИВАЕМ ПОНЯТИЕ ВРЕМЕНИ!'",
        "БЭКЛОГ — ЭТО КЛАДБИЩЕ ХОРОШИХ ИДЕЙ, КОТОРЫЕ УБИЛ БЮДЖЕТ!"
    ];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function load(src) {
        return new Promise(res => {
            const img = new Image();
            img.src = src;
            img.onload = () => res(img);
            img.onerror = () => res(null);
        });
    }

    (async function() {
        // --- ЗАГРУЗКА СПРАЙТ-ЛИСТОВ (Крис) ---
        const sprites = {
            idle: await load("idle.png"),
            runSheet: await load("run_sheet.png"), // Лист из 12 кадров бега
            jumpSheet: await load("jump_sheet.png"), // Лист прыжка
            little: await load("Little.png"),
            big: await load("big.png")
        };
        const bgs = [await load("bg1.png"), await load("bg2.png"), await load("bg3.png")];

        const GROUND_Y = canvas.height - 120;
        const FINISH_LINE_X = 6500;

        // Физика настроена под Крис-спрайты
        let player = {
            x: 150, y: GROUND_Y - 130, w: 75, h: 130, 
            vx: 0, vy: 0, accel: 0.8, friction: 0.85, maxSpeed: 7, gravity: 0.8, jumpPower: -18,
            grounded: false, jumps: 0, maxJumps: 2, frame: 0, dir: 1, lives: 3,
            state: 'idle', // idle, run, jump, fall
            breathTimer: 0
        };

        // НАСТРОЙКИ СПРАЙТ-ЛИСТОВ (frames - кол-во кадров, time - скорость анимации)
        const animationConfig = {
            run: { frames: 12, width: 85, height: 130, time: 0.2 }, // 12 супер-плавных кадров
            jump: { frames: 8, width: 85, height: 130, time: 0.15 } // 8 фаз прыжка
        };

        let bullets = []; let fireballs = []; let enemies = [];
        let boss = { x: 5500, y: GROUND_Y - 220, w: 220, h: 220, vx: -2.5, vy: 0, hp: 10, active: false, shotTimer: 0 };
        let lerpCameraX = 0;
        let keys = { a: false, d: false };

        let jokeBlocks = [
            { x: 900, y: GROUND_Y - 280, hit: false },
            { x: 2500, y: GROUND_Y - 280, hit: false },
            { x: 4100, y: GROUND_Y - 280, hit: false }
        ];
        let cvBlock = { x: 4800, y: GROUND_Y - 280, hit: false };

        for(let i=0; i<5; i++) {
            enemies.push({ x: 1200 + i*1100, y: GROUND_Y - 90, w: 90, h: 90, vx: -3, vy: 0, alive: true });
        }

        window.addEventListener("keydown", e => {
            if (e.code === "KeyA") keys.a = true;
            if (e.code === "KeyD") keys.d = true;
            if (e.code === "KeyW" && player.jumps < player.maxJumps) {
                player.vy = player.jumpPower; player.jumps++; player.grounded = false;
                if (player.state !== 'jump') player.frame = 0; // Сброс кадра прыжка
            }
            if (e.code === "Space") {
                bullets.push({ x: player.x + (player.dir === 1 ? player.w : 0), y: player.y + 60, vx: player.dir * 14 });
            }
        });
        window.addEventListener("keyup", e => {
            if (e.code === "KeyA") keys.a = false;
            if (e.code === "KeyD") keys.d = false;
        });

        function update() {
            if (player.lives <= 0) return;

            if (keys.a) { player.vx -= player.accel; player.dir = -1; }
            else if (keys.d) { player.vx += player.accel; player.dir = 1; }
            else { player.vx *= player.friction; }

            if (Math.abs(player.vx) < 0.2) player.vx = 0;
            if (player.vx > player.maxSpeed) player.vx = player.maxSpeed;
            if (player.vx < -player.maxSpeed) player.vx = -player.maxSpeed;

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.y + player.h > GROUND_Y) {
                player.y = GROUND_Y - player.h;
                player.vy = 0; player.grounded = true; player.jumps = 0;
            } else {
                player.grounded = false;
            }

            // ОПРЕДЕЛЯЕМ СОСТОЯНИЕ (для выбора спрайт-листа)
            if (!player.grounded) {
                player.state = 'jump';
            } else if (player.vx !== 0) {
                player.state = 'run';
            } else {
                player.state = 'idle';
            }

            // Блоки
            jokeBlocks.forEach(b => {
                if (!b.hit && player.x + player.w > b.x && player.x < b.x + 80 && player.vy < 0 && player.y < b.y + 80 && player.y > b.y) {
                    b.hit = true; player.vy = 6;
                    jokeOverlay.innerText = jokes[Math.floor(Math.random() * jokes.length)];
                    jokeOverlay.style.display = "flex";
                    setTimeout(() => jokeOverlay.style.display = "none", 3500);
                }
            });

            if (!cvBlock.hit && player.x + player.w > cvBlock.x && player.x < cvBlock.x + 80 && player.vy < 0 && player.y < cvBlock.y + 80 && player.y > cvBlock.y) {
                cvBlock.hit = true; player.vy = 6;
                const link = document.createElement('a'); link.href = 'resume.pdf'; link.download = 'Denis_CV.pdf'; link.click();
            }

            // Враги, Пули
            bullets.forEach((bull, i) => {
                bull.x += bull.vx;
                enemies.forEach(en => { if (en.alive && bull.x > en.x && bull.x < en.x + en.w && bull.y > en.y && bull.y < en.y + en.h) { en.alive = false; bullets.splice(i, 1); } });
            });
            enemies.forEach(en => {
                if (!en.alive) return; en.x += en.vx; if (en.x < 100 || en.x > 6000) en.vx *= -1;
                if (player.x + player.w > en.x && player.x < en.x + en.w && player.y + player.h > en.y && player.y < en.y + en.h) { player.lives--; player.x -= 150; document.getElementById("lives").innerText = "ЖИЗНИ: " + "♥".repeat(Math.max(0, player.lives)); if(player.lives <= 0) location.reload(); }
            });

            // Босс, Финиш
            if (player.x > 5000) { boss.active = true; document.getElementById("boss-bar").style.display = "block"; }
            if (boss.active && boss.hp > 0) { boss.x += boss.vx; if (boss.x < 5200 || boss.x > 6000) boss.vx *= -1; boss.shotTimer++; if (boss.shotTimer > 90) { fireballs.push({ x: boss.x, y: boss.y + 100, vx: -8 }); boss.shotTimer = 0; } }
            if (player.x > FINISH_LINE_X) window.location.href = "https://disvolo17.github.io/work/";

            lerpCameraX += (player.x - canvas.width / 2 - lerpCameraX) * 0.08;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bgs.forEach((bg, i) => { if (!bg) return; let x = -(lerpCameraX * [0.1, 0.3, 0.6][i]) % canvas.width; ctx.drawImage(bg, x, 0, canvas.width, canvas.height); ctx.drawImage(bg, x + canvas.width, 0, canvas.width, canvas.height); });
            ctx.fillStyle = "#3d2516"; ctx.fillRect(0, GROUND_Y, canvas.width, 120); ctx.fillStyle = "#2ecc71"; ctx.fillRect(0, GROUND_Y, canvas.width, 15);
            jokeBlocks.forEach(b => { ctx.fillStyle = b.hit ? "#333" : "#f1c40f"; ctx.fillRect(b.x - lerpCameraX, b.y, 80, 80); });
            ctx.fillStyle = "#3498db"; ctx.fillRect(cvBlock.x - lerpCameraX, cvBlock.y, 80, 80); ctx.fillStyle = "rgba(0, 255, 0, 0.3)"; ctx.fillRect(FINISH_LINE_X - lerpCameraX, GROUND_Y - 300, 100, 300);
            enemies.forEach(en => { if (en.alive && sprites.little) ctx.drawImage(sprites.little, en.x - lerpCameraX, en.y, en.w, en.h); });
            if (boss.active && boss.hp > 0 && sprites.big) ctx.drawImage(sprites.big, boss.x - lerpCameraX, boss.y, boss.w, boss.h);
            ctx.fillStyle = "yellow"; bullets.forEach(b => ctx.fillRect(b.x - lerpCameraX, b.y, 18, 6)); ctx.fillStyle = "red"; fireballs.forEach(f => { ctx.beginPath(); ctx.arc(f.x - lerpCameraX + 15, f.y + 15, 15, 0, Math.PI*2); ctx.fill(); });

            // --- КРИС-ГЕРОЙ: ПЛАВНЫЙ РЕНДЕР ИЗ СПРАЙТ-ЛИСТОВ ---
            let sheetImg, currentFrameCount, sheetW, sheetH, animSpeed;
            let displayH = player.h;
            let displayW = player.w + 10; // Спрайт Крис чуть шире (85px), чем хитбокс (75px)

            ctx.save();
            ctx.translate(player.x - lerpCameraX, player.y);

            // Режим прорисовки (если идем влево - зеркалим, если прыгаем - сдвиг по оси)
            if (player.dir === -1) { ctx.scale(-1, 1); ctx.translate(-displayW, 0); }

            if (player.state === 'run') {
                sheetImg = sprites.runSheet;
                ({ frames: currentFrameCount, width: sheetW, height: sheetH, time: animSpeed } = animationConfig.run);
                player.frame += animSpeed;
                
            } else if (player.state === 'jump') {
                sheetImg = sprites.jumpSheet;
                ({ frames: currentFrameCount, width: sheetW, height: sheetH, time: animSpeed } = animationConfig.jump);
                player.frame += animSpeed;
                // Прыжок проигрывается один раз до последнего кадра
                if (player.frame >= currentFrameCount) player.frame = currentFrameCount - 1;

            } else {
                // СТОИТ (idle.png) - ЭФФЕКТ ДЫХАНИЯ
                player.frame = 0;
                player.breathTimer += 0.05;
                displayH += Math.sin(player.breathTimer) * 2; 
                ctx.translate(0, player.h - displayH); // Центрируем Крис
                ctx.drawImage(sprites.idle, 0, 0, displayW, displayH);
            }

            // Рисуем кадр из спрайт-листа (Бег или Прыжок)
            if (sheetImg) {
                let currentFrameIdx = Math.floor(player.frame) % currentFrameCount;
                ctx.drawImage(
                    sheetImg, 
                    currentFrameIdx * sheetW, 0, sheetW, sheetH, // Вырезаем из листа
                    0, 0, displayW, displayH // Рисуем в игру
                );
            }

            ctx.restore();

            requestAnimationFrame(draw);
        }
        setInterval(update, 1000/60); draw();
    })();
});
</script>
</body>
</html>
