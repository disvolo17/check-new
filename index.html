<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disvolo17 - Dubai 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="hud">
            <div class="stats">
                <p>SCORE: <span id="score">2500</span></p>
                <p>PROGRESS: 40%</p>
            </div>
            <div class="world-info">
                <p>WORLD: 1-DUBAI</p>
                <div class="avatar-container"><img id="avatar-img" src="avatar.png" alt=""></div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="controls">
            <div class="dpad">
                <button id="btn-left">◀</button>
                <button id="btn-right">▶</button>
            </div>
            <div class="actions">
                <button id="btn-jump">A</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
