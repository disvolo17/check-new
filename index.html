<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denis - PM Action Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Press Start 2P', cursive; touch-action: manipulation; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 0; right: 0; color: #00ff00; font-size: 12px; text-align: center; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; line-height: 1.6; padding: 0 50px; }
        #boss-ui { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 300px; height: 20px; border: 2px solid #fff; display: none; }
        #boss-hp { width: 100%; height: 100%; background: red; transition: width 0.3s; }
    </style>
</head>
<body>

<div id="ui">W - ПРЫЖОК | A, D - ДВИЖЕНИЕ | SPACE - ОГОНЬ</div>
<div id="boss-ui"><div id="boss-hp"></div></div>
<canvas id="game"></canvas>

<script>
window.addEventListener("load", () => {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const ui = document.getElementById("ui");

    const jokes = [
        "ПМ заходит в бар, заказывает пиво, 0 пива, 999999 пива, ящерицу в стакане...",
        "Дедлайн — это как линия горизонта: красиво, но недостижимо.",
        "У нас нет багов, это незадокументированные фичи!",
        "Девять женщин не могут родить ребенка за один месяц.",
        "План проекта — это список вещей, которые не произойдут."
    ];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function load(src) {
        return new Promise(res => {
            const img = new Image();
            img.src = src;
            img.onload = () => res(img);
            img.onerror = () => res(null);
        });
    }

    (async function() {
        const sprites = {
            idle: await load("idle.png"),
            run: [await load("run.png"), await load("run1.png"), await load("run2.png"), await load("run3.png")],
            little: await load("Little.png"),
            big: await load("big.png")
        };
        const platformImg = await load("platform.png");

        const GROUND_Y = canvas.height - 100;

        let player = {
            x: 100, y: GROUND_Y - 100, w: 70, h: 110, // Вытянули и увеличили
            vx: 0, vy: 0, accel: 0.5, friction: 0.9, maxSpeed: 6, gravity: 0.6, jumpPower: -14,
            grounded: false, jumps: 0, maxJumps: 2, frame: 0, dir: 1
        };

        let bullets = [];
        let enemies = [];
        let fireworks = [];
        let boss = { x: 5500, y: GROUND_Y - 200, w: 200, h: 200, hp: 10, active: false };
        let cameraX = 0, lerpCameraX = 0;
        let keys = { a: false, d: false };

        // Генерация Little
        for(let i=0; i<5; i++) {
            enemies.push({ x: 1000 + i*800, y: GROUND_Y - 60, w: 60, h: 60, vx: -2, vy: 0, type: 'little' });
        }

        let resumeBlocks = [
            { x: 800, y: GROUND_Y - 250, text: "PM NOTION MASTER", hit: false },
            { x: 1600, y: GROUND_Y - 250, text: "36 CITIES TOUR", hit: false },
            { x: 2400, y: GROUND_Y - 250, text: "CREATIVE PRODUCER", hit: false }
        ];

        window.addEventListener("keydown", e => {
            if (e.code === "KeyA") keys.a = true;
            if (e.code === "KeyD") keys.d = true;
            if (e.code === "KeyW") {
                if(player.jumps < player.maxJumps) {
                    player.vy = player.jumpPower;
                    player.jumps++;
                    player.grounded = false;
                }
            }
            if (e.code === "Space") {
                bullets.push({ x: player.x + (player.dir === 1 ? player.w : 0), y: player.y + 40, vx: player.dir * 10 });
            }
        });
        window.addEventListener("keyup", e => {
            if (e.code === "KeyA") keys.a = false;
            if (e.code === "KeyD") keys.d = false;
        });

        function update() {
            // Движение героя
            if (keys.a) { player.vx -= player.accel; player.dir = -1; }
            else if (keys.d) { player.vx += player.accel; player.dir = 1; }
            else { player.vx *= player.friction; }

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.y + player.h > GROUND_Y) {
                player.y = GROUND_Y - player.h;
                player.vy = 0;
                player.grounded = true;
                player.jumps = 0;
            }

            // Блоки и анекдоты
            resumeBlocks.forEach(b => {
                if (!b.hit && player.x + player.w > b.x && player.x < b.x + 60 && player.vy < 0 && player.y < b.y + 60 && player.y > b.y) {
                    b.hit = true;
                    player.vy = 4;
                    ui.innerText = jokes[Math.floor(Math.random() * jokes.length)];
                    // Салют
                    for(let i=0; i<10; i++) fireworks.push({x: b.x+30, y: b.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1});
                }
            });

            // Пули и враги
            bullets.forEach((bullet, bIdx) => {
                bullet.x += bullet.vx;
                enemies.forEach((en, eIdx) => {
                    if (bullet.x > en.x && bullet.x < en.x + en.w && bullet.y > en.y && bullet.y < en.y + en.h) {
                        enemies.splice(eIdx, 1);
                        bullets.splice(bIdx, 1);
                    }
                });
                // Попадание в босса
                if (boss.active && bullet.x > boss.x && bullet.x < boss.x + boss.w && bullet.y > boss.y && bullet.y < boss.y + boss.h) {
                    boss.hp--;
                    bullets.splice(bIdx, 1);
                    document.getElementById("boss-hp").style.width = (boss.hp * 10) + "%";
                }
            });

            // Логика Little (прыжки)
            enemies.forEach(en => {
                en.x += en.vx;
                if (Math.random() < 0.02 && en.y + en.h >= GROUND_Y) en.vy = -10;
                en.vy += 0.5; en.y += en.vy;
                if (en.y + en.h > GROUND_Y) { en.y = GROUND_Y - en.h; en.vy = 0; }
                if (en.x < 100 || en.x > 5000) en.vx *= -1;
            });

            // Активация босса
            if (player.x > 5000) {
                boss.active = true;
                document.getElementById("boss-ui").style.display = "block";
            }

            if (boss.hp <= 0 && boss.active) {
                ui.innerText = "BOSS DEFEATED! DOWNLOADING CV...";
                boss.active = false;
                setTimeout(() => { window.location.href = "https://disvolo17.github.io/work/"; }, 3000);
            }

            cameraX = player.x - canvas.width / 2;
            lerpCameraX += (cameraX - lerpCameraX) * 0.1;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Земля
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(0, GROUND_Y, canvas.width, 100);

            // Блоки
            resumeBlocks.forEach(b => {
                ctx.fillStyle = b.hit ? "#333" : "#FFD700";
                ctx.fillRect(b.x - lerpCameraX, b.y, 60, 60);
            });

            // Враги Little
            enemies.forEach(en => {
                if (sprites.little) ctx.drawImage(sprites.little, en.x - lerpCameraX, en.y, en.w, en.h);
            });

            // Босс
            if (boss.active && sprites.big) {
                ctx.drawImage(sprites.big, boss.x - lerpCameraX, boss.y, boss.w, boss.h);
            }

            // Пули
            ctx.fillStyle = "yellow";
            bullets.forEach(b => ctx.fillRect(b.x - lerpCameraX, b.y, 10, 5));

            // Игрок
            let img = sprites.idle;
            if (Math.abs(player.vx) > 1) {
                player.frame += 0.15;
                img = sprites.run[Math.floor(player.frame) % 4];
            }
            ctx.save();
            if (player.dir === -1) {
                ctx.translate(player.x - lerpCameraX + player.w, player.y);
                ctx.scale(-1, 1);
                ctx.drawImage(img || new Image(), 0, 0, player.w, player.h);
            } else {
                ctx.drawImage(img || new Image(), player.x - lerpCameraX, player.y, player.w, player.h);
            }
            ctx.restore();

            requestAnimationFrame(draw);
        }
        setInterval(update, 1000/60); draw();
    })();
});
</script>
</body>
</html>
