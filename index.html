<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denis - Mario Style PM Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; touch-action: manipulation; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; }
        #lives { color: #ff0000; font-size: 18px; text-shadow: 2px 2px #000; }
        #joke-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.8); color: #fff; display: none; 
            align-items: center; justify-content: center; text-align: center; 
            font-size: 16px; padding: 40px; z-index: 100; text-transform: uppercase; line-height: 1.6;
        }
    </style>
</head>
<body>

<div id="ui-layer"><div id="lives">ЖИЗНИ: ♥♥♥</div></div>
<div id="joke-overlay">АНЕКДОТ</div>
<canvas id="game"></canvas>

<script>
window.addEventListener("load", () => {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const jokeOverlay = document.getElementById("joke-overlay");

    const jokes = [
        "ПРОДЖЕКТ-МЕНЕДЖЕР — ЭТО ЧЕЛОВЕК, КОТОРЫЙ СЧИТАЕТ, ЧТО 9 ЖЕНЩИН МОГУТ РОДИТЬ ЗА МЕСЯЦ!",
        "ЗАКАЗЧИК: 'ВЧЕРА'. ПМ: 'ВОТ ВАМ СЧЕТ И ГАЛЛЮЦИНАЦИЯ!'",
        "БЭКЛОГ — ЭТО КЛАДБИЩЕ ХОРОШИХ ИДЕЙ!"
    ];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    function load(src) {
        return new Promise(res => {
            const img = new Image(); img.src = src;
            img.onload = () => res(img); img.onerror = () => res(null);
        });
    }

    (async function() {
        const sprites = {
            idle: await load("idle.png"),
            run: await load("run_sheet.png") || await load("run_sheet.jpg"),
            jump: await load("jump_sheet.png") || await load("jump_sheet.jpg"),
            little: await load("Little.png"),
            big: await load("big.png")
        };
        const bgs = [await load("bg1.png"), await load("bg2.png"), await load("bg3.png")];

        const GROUND_Y = canvas.height - 120;
        let player = {
            x: 150, y: GROUND_Y - 140, w: 75, h: 130, 
            vx: 0, vy: 0, 
            accel: 0.5,     // Плавный разгон
            friction: 0.9,  // Инерция (торможение)
            maxSpeed: 5.5,  // Ограничение скорости
            gravity: 0.7, 
            jumpPower: -17,
            grounded: false, jumps: 0, maxJumps: 2, frame: 0, dir: 1, lives: 3
        };

        // Блоки с эффектом подпрыгивания (offsetY)
        let blocks = [
            { x: 1000, y: GROUND_Y - 260, w: 70, h: 70, type: 'joke', offsetY: 0 },
            { x: 1800, y: GROUND_Y - 360, w: 70, h: 70, type: 'joke', offsetY: 0 },
            { x: 2800, y: GROUND_Y - 260, w: 70, h: 70, type: 'joke', offsetY: 0 },
            { x: 4800, y: GROUND_Y - 260, w: 70, h: 70, type: 'cv', offsetY: 0 }
        ];

        let enemies = [];
        for(let i=0; i<5; i++) enemies.push({ x: 1300 + i*1100, y: GROUND_Y - 80, w: 80, h: 80, vx: -2.5, alive: true });

        let lerpCameraX = 0;
        let keys = { a: false, d: false };

        window.addEventListener("keydown", e => {
            if (e.code === "KeyA") keys.a = true;
            if (e.code === "KeyD") keys.d = true;
            if (e.code === "KeyW" && player.jumps < player.maxJumps) {
                player.vy = player.jumpPower; player.jumps++; player.grounded = false;
            }
        });
        window.addEventListener("keyup", e => { if (e.code === "KeyA") keys.a = false; if (e.code === "KeyD") keys.d = false; });

        function update() {
            // Инерция
            if (keys.a) { player.vx -= player.accel; player.dir = -1; }
            else if (keys.d) { player.vx += player.accel; player.dir = 1; }
            else { player.vx *= player.friction; }

            // Ограничение скорости
            if (player.vx > player.maxSpeed) player.vx = player.maxSpeed;
            if (player.vx < -player.maxSpeed) player.vx = -player.maxSpeed;

            player.vy += player.gravity; player.x += player.vx; player.y += player.vy;

            // Пол
            if (player.y + player.h > GROUND_Y) {
                player.y = GROUND_Y - player.h; player.vy = 0; player.grounded = true; player.jumps = 0;
            } else { player.grounded = false; }

            // ФИЗИКА БЛОКОВ (Марио-style столкновения)
            blocks.forEach(b => {
                b.offsetY *= 0.8; // Плавный возврат блока на место
                
                if (player.x + player.w > b.x && player.x < b.x + b.w && 
                    player.y + player.h > b.y + b.offsetY && player.y < b.y + b.h + b.offsetY) {
                    
                    let overlapTop = (player.y + player.h) - (b.y + b.offsetY);
                    let overlapBot = (b.y + b.h + b.offsetY) - player.y;
                    let overlapLeft = (player.x + player.w) - b.x;
                    let overlapRight = (b.x + b.w) - player.x;
                    let min = Math.min(overlapTop, overlapBot, overlapLeft, overlapRight);

                    if (min === overlapTop && player.vy > 0) { // Сверху
                        player.y = b.y + b.offsetY - player.h; player.vy = 0; player.grounded = true; player.jumps = 0;
                    } else if (min === overlapBot && player.vy < 0) { // СНИЗУ (Удар!)
                        player.y = b.y + b.h + b.offsetY; player.vy = 3;
                        b.offsetY = -15; // Подпрыгивание блока
                        activateBlock(b);
                    } else if (min === overlapLeft) { player.x = b.x - player.w; player.vx = 0; }
                    else if (min === overlapRight) { player.x = b.x + b.w; player.vx = 0; }
                }
            });

            function activateBlock(b) {
                if (b.type === 'joke') {
                    jokeOverlay.innerText = jokes[Math.floor(Math.random() * jokes.length)];
                    jokeOverlay.style.display = "flex"; setTimeout(() => jokeOverlay.style.display = "none", 2500);
                } else { window.open('resume.pdf', '_blank'); }
            }

            enemies.forEach(en => {
                if (!en.alive) return; en.x += en.vx; if (en.x < 500 || en.x > 6000) en.vx *= -1;
                if (player.x + player.w > en.x && player.x < en.x + en.w && player.y + player.h > en.y && player.y < en.y + en.h) { 
                    player.lives--; player.x -= 100; document.getElementById("lives").innerText = "ЖИЗНИ: " + "♥".repeat(Math.max(0, player.lives)); 
                    if(player.lives <= 0) location.reload(); 
                }
            });

            lerpCameraX += (player.x - canvas.width / 2 - lerpCameraX) * 0.08;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bgs.forEach((bg, i) => { if (bg) { let x = -(lerpCameraX * (0.1 * (i+1))) % canvas.width; ctx.drawImage(bg, x, 0, canvas.width, canvas.height); ctx.drawImage(bg, x + canvas.width, 0, canvas.width, canvas.height); } });
            
            ctx.fillStyle = "#3d2516"; ctx.fillRect(0, GROUND_Y, canvas.width, 120);
            
            // Рисуем кубики с вопросом
            blocks.forEach(b => {
                ctx.fillStyle = b.type === 'joke' ? "#f39c12" : "#3498db";
                ctx.fillRect(b.x - lerpCameraX, b.y + b.offsetY, b.w, b.h);
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
                ctx.strokeRect(b.x - lerpCameraX + 5, b.y + b.offsetY + 5, b.w - 10, b.h - 10);
                // Знак вопроса
                ctx.fillStyle = "#fff"; ctx.font = "bold 30px Arial";
                ctx.fillText("?", b.x - lerpCameraX + 22, b.y + b.offsetY + 45);
            });

            enemies.forEach(en => { if (en.alive && sprites.little) ctx.drawImage(sprites.little, en.x - lerpCameraX, en.y, en.w, en.h); });

            // КРИС
            ctx.save();
            ctx.translate(player.x - lerpCameraX, player.y);
            if (player.dir === -1) { ctx.scale(-1, 1); ctx.translate(-player.w, 0); }

            let state = !player.grounded ? 'jump' : (Math.abs(player.vx) > 0.5 ? 'run' : 'idle');
            if (state === 'idle' && sprites.idle) {
                ctx.drawImage(sprites.idle, 0, 0, player.w, player.h);
            } else {
                let sheet = state === 'run' ? sprites.run : sprites.jump;
                let conf = state === 'run' ? {cols:4, rows:4, total:16, spd:0.25} : {cols:4, rows:2, total:8, spd:0.15};
                if (sheet) {
                    player.frame += conf.spd;
                    let idx = Math.floor(player.frame) % conf.total;
                    let fw = sheet.width / conf.cols; let fh = sheet.height / conf.rows;
                    ctx.drawImage(sheet, (idx%conf.cols)*fw, Math.floor(idx/conf.cols)*fh, fw, fh, 0, 0, player.w, player.h);
                }
            }
            ctx.restore();
            requestAnimationFrame(draw);
        }
        setInterval(update, 1000/60); draw();
    })();
});
</script>
</body>
</html>
