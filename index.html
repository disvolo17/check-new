<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Denis Game FINAL</title>
<style>
body{margin:0;overflow:hidden;background:#000}
canvas{display:block}
#ui{position:fixed;top:10px;left:10px;color:#fff;font-family:Arial}
.btn{position:fixed;bottom:20px;width:60px;height:60px;background:#fff2;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}
#left{left:20px}#right{left:100px}#jump{right:100px}#shoot{right:20px}
</style>
</head>
<body>
<div id="ui">♥♥♥</div>
<div id="left" class="btn">←</div>
<div id="right" class="btn">→</div>
<div id="jump" class="btn">↑</div>
<div id="shoot" class="btn">●</div>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
function resize(){c.width=innerWidth;c.height=innerHeight}resize();onresize=resize;

let G=c.height-120;
let p={x:100,y:G-100,w:60,h:100,vx:0,vy:0,dir:1,ground:false,jumps:0,lives:3};
let bullets=[],particles=[];
let boss={x:2000,y:G-200,w:200,h:200,hp:20,phase:0,timer:0};
let blocks=[{x:400,y:G-200,w:80,h:80,hit:false}];

let keys={};
addEventListener('keydown',e=>keys[e.code]=1);
addEventListener('keyup',e=>keys[e.code]=0);

// mobile
['left','right','jump','shoot'].forEach(id=>{
 let el=document.getElementById(id);
 el.ontouchstart=()=>keys[id]=1;
 el.ontouchend=()=>keys[id]=0;
});

function spawnParticles(xp,yp){
 for(let i=0;i<10;i++)particles.push({x:xp,y:yp,vx:(Math.random()-0.5)*6,vy:-Math.random()*5,life:30});
}

function update(){
 // movement
 if(keys.KeyA||keys.left){p.vx-=0.5;p.dir=-1}
 if(keys.KeyD||keys.right){p.vx+=0.5;p.dir=1}
 p.vx*=0.9;
 if((keys.KeyW||keys.jump)&&p.jumps<2){p.vy=-15;p.jumps++;keys.jump=0}
 if(keys.Space||keys.shoot){bullets.push({x:p.x,y:p.y+50,vx:p.dir*10});keys.shoot=0}

 p.vy+=0.8;
 p.x+=p.vx;p.y+=p.vy;

 if(p.y+p.h>G){p.y=G-p.h;p.vy=0;p.jumps=0;p.ground=true}

 // blocks mario hit
 blocks.forEach(b=>{
  if(p.x<p.x+p.w && p.x+p.w>b.x && p.y<b.y+b.h && p.y+p.h>b.y){
   if(p.vy<0 && p.y>b.y){
    p.vy=5;
    if(!b.hit){b.hit=true; b.anim=10; spawnParticles(b.x+40,b.y)}
   }
  }
  if(b.anim>0)b.anim--;
 });

 // bullets
 for(let i=bullets.length-1;i>=0;i--){
  let b=bullets[i];b.x+=b.vx;
  if(b.x>boss.x&&b.x<boss.x+boss.w&&b.y>boss.y&&b.y<boss.y+boss.h){
   boss.hp--;bullets.splice(i,1);spawnParticles(boss.x+100,boss.y);
  }
 }

 // boss AI
 boss.timer++;
 if(boss.phase===0){
  boss.x+=Math.sin(boss.timer/30)*2;
  if(boss.timer>200){boss.phase=1;boss.timer=0}
 }
 else if(boss.phase===1){
  if(boss.timer%40===0){
   bullets.push({x:boss.x,y:boss.y+100,vx:-6});
  }
  if(boss.timer>200){boss.phase=2;boss.timer=0}
 }
 else{
  boss.x+= (p.x>boss.x?2:-2);
 }

 // particles
 particles.forEach((pt,i)=>{
  pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.3;pt.life--;
  if(pt.life<=0)particles.splice(i,1);
 });
}

function draw(){
 x.clearRect(0,0,c.width,c.height);

 // ground
 x.fillStyle='#333';x.fillRect(0,G,c.width,200);

 // blocks
 blocks.forEach(b=>{
  let offset=b.anim?Math.sin(b.anim)*5:0;
  x.fillStyle=b.hit?'#555':'#ff0';
  x.fillRect(b.x,b.y-offset,b.w,b.h);
 });

 // player
 x.fillStyle='#0f0';
 x.fillRect(p.x,p.y,p.w,p.h);

 // boss
 x.fillStyle='#f00';
 x.fillRect(boss.x,boss.y,boss.w,boss.h);

 // bullets
 x.fillStyle='#fff';
 bullets.forEach(b=>x.fillRect(b.x,b.y,10,5));

 // particles
 particles.forEach(pt=>x.fillRect(pt.x,pt.y,3,3));

}

function loop(){update();draw();requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
