<html lang="ru">
<head>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; /* Черный фон вокруг игры */
            color: #fff;
            font-family: 'Press Start 2P', cursive; /* Пиксельный шрифт */
            height: 100vh;
            overflow: hidden; /* Убираем скролл браузера */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            position: relative;
            border: 4px solid #fff; /* Рамка игрового окна */
            box-shadow: 0 20px 50px rgba(0,255,255, 0.3); /* Неоновое свечение */
        }

        canvas {
            display: block;
            background: #0d1117; /* Фон внутри игры (темно-синий) */
        }

        /* Оверлей управления для мобилок */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: none; /* Скрыт по умолчанию на десктопе */
            gap: 10px;
        }
        .btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border: 2px solid #fff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            user-select: none;
        }
    </style>
</head>
