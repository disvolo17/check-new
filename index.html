<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denis - PM Dubai Action Game (Final Ultra Fix)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; touch-action: manipulation; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; }
        #lives { color: #ff0000; font-size: 20px; text-shadow: 2px 2px #000; }
        #boss-bar { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 300px; height: 15px; border: 3px solid #fff; display: none; background: #222; }
        #boss-hp { width: 100%; height: 100%; background: #f00; transition: width 0.2s; }
        #joke-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.8); color: #00ff00; display: none; 
            align-items: center; justify-content: center; text-align: center; 
            font-size: 18px; padding: 40px; z-index: 100; text-transform: uppercase; line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="lives">ЖИЗНИ: ♥♥♥</div>
    <div id="boss-bar"><div id="boss-hp"></div></div>
</div>
<div id="joke-overlay">АНЕКДОТ</div>
<canvas id="game"></canvas>

<script>
window.addEventListener("load", () => {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const jokeOverlay = document.getElementById("joke-overlay");

    const jokes = [
        "ПРОДЖЕКТ-МЕНЕДЖЕР — ЭТО ЧЕЛОВЕК, КОТОРЫЙ СЧИТАЕТ, ЧТО 9 ЖЕНЩИН МОГУТ РОДИТЬ РЕБЕНКА ЗА МЕСЯЦ!",
        "ЗАКАЗЧИК: 'МЫ ХОТИМ ВСЁ И ВЧЕРА'. ПМ: 'ВОТ ВАМ СЧЕТ И ГАЛЛЮЦИНАЦИЯ БЭКЛОГА!'",
        "БЭКЛОГ — ЭТО КЛАДБИЩЕ ХОРОШИХ ИДЕЙ, КОТОРЫЕ УБИЛ БЮДЖЕТ!"
    ];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    function load(src) {
        return new Promise(res => {
            const img = new Image(); img.src = src;
            img.onload = () => res(img); img.onerror = () => res(null);
        });
    }

    (async function() {
        const sprites = {
            idle: await load("idle.png"),
            runSheet: await load("run_sheet.png") || await load("run_sheet.jpg"),
            jumpSheet: await load("jump_sheet.png") || await load("jump_sheet.jpg"),
            little: await load("Little.png"),
            big: await load("big.png")
        };
        const bgs = [await load("bg1.png"), await load("bg2.png"), await load("bg3.png")];

        const GROUND_Y = canvas.height - 120;
        let player = {
            x: 150, y: GROUND_Y - 140, w: 85, h: 140, 
            vx: 0, vy: 0, accel: 0.8, friction: 0.85, maxSpeed: 7, gravity: 0.8, jumpPower: -19,
            grounded: false, jumps: 0, maxJumps: 2, frame: 0, dir: 1, lives: 3, state: 'idle'
        };

        const anim = {
            run: { cols: 4, rows: 4, total: 16, speed: 0.25 },
            jump: { cols: 4, rows: 2, total: 8, speed: 0.15 }
        };

        let bullets = []; let fireballs = []; let enemies = [];
        let boss = { x: 5500, y: GROUND_Y - 220, w: 220, h: 220, vx: -2.5, hp: 10, active: false, shotTimer: 0 };
        let lerpCameraX = 0;
        let keys = { a: false, d: false };

        let blocks = [
            { x: 1000, y: GROUND_Y - 250, w: 80, h: 80, type: 'joke' },
            { x: 1800, y: GROUND_Y - 350, w: 80, h: 80, type: 'joke' },
            { x: 2800, y: GROUND_Y - 250, w: 80, h: 80, type: 'joke' },
            { x: 3800, y: GROUND_Y - 350, w: 80, h: 80, type: 'joke' },
            { x: 4800, y: GROUND_Y - 250, w: 80, h: 80, type: 'cv' }
        ];

        for(let i=0; i<5; i++) enemies.push({ x: 1400 + i*1100, y: GROUND_Y - 90, w: 90, h: 90, vx: -3, alive: true });

        window.addEventListener("keydown", e => {
            if (e.code === "KeyA") keys.a = true;
            if (e.code === "KeyD") keys.d = true;
            if (e.code === "KeyW" && player.jumps < player.maxJumps) {
                player.vy = player.jumpPower; player.jumps++; player.grounded = false; player.frame = 0;
            }
            if (e.code === "Space") bullets.push({ x: player.x + (player.dir === 1 ? player.w : 0), y: player.y + 60, vx: player.dir * 14 });
        });
        window.addEventListener("keyup", e => { if (e.code === "KeyA") keys.a = false; if (e.code === "KeyD") keys.d = false; });

        function update() {
            if (player.lives <= 0) return;

            if (keys.a) { player.vx -= player.accel; player.dir = -1; }
            else if (keys.d) { player.vx += player.accel; player.dir = 1; }
            else { player.vx *= player.friction; }
            
            player.vy += player.gravity; player.x += player.vx; player.y += player.vy;

            if (player.y + player.h > GROUND_Y) {
                player.y = GROUND_Y - player.h; player.vy = 0; player.grounded = true; player.jumps = 0;
            } else { player.grounded = false; }

            // ПРОВЕРКА СТОЛКНОВЕНИЙ С БЛОКАМИ (Твердые со всех сторон)
            blocks.forEach(b => {
                if (player.x + player.w > b.x && player.x < b.x + b.w && player.y + player.h > b.y && player.y < b.y + b.h) {
                    let bMidX = b.x + b.w/2; let bMidY = b.y + b.h/2;
                    let pMidX = player.x + player.w/2; let pMidY = player.y + player.h/2;
                    let dx = (bMidX - pMidX) / (b.w/2); let dy = (bMidY - pMidY) / (b.h/2);
                    let absX = Math.abs(dx); let absY = Math.abs(dy);

                    if (Math.abs(absX - absY) < 0.1) {
                        if (dy < 0) { player.y = b.y + b.h; player.vy = 5; activateBlock(b); }
                        else { player.y = b.y - player.h; player.vy = 0; player.grounded = true; }
                    } else if (absX > absY) {
                        if (dx > 0) player.x = b.x - player.w; else player.x = b.x + b.w;
                        player.vx = 0;
                    } else {
                        if (dy > 0) { player.y = b.y - player.h; player.vy = 0; player.grounded = true; }
                        else { player.y = b.y + b.h; player.vy = 5; activateBlock(b); }
                    }
                }
            });

            function activateBlock(b) {
                if (b.type === 'joke') {
                    jokeOverlay.innerText = jokes[Math.floor(Math.random() * jokes.length)];
                    jokeOverlay.style.display = "flex"; setTimeout(() => jokeOverlay.style.display = "none", 3000);
                } else if (b.type === 'cv') {
                    window.open('resume.pdf', '_blank');
                }
            }

            // Враги и Босс
            enemies.forEach(en => {
                if (!en.alive) return; en.x += en.vx; if (en.x < 500 || en.x > 6000) en.vx *= -1;
                if (player.x + player.w > en.x && player.x < en.x + en.w && player.y + player.h > en.y && player.y < en.y + en.h) { 
                    player.lives--; player.x -= 150; 
                    document.getElementById("lives").innerText = "ЖИЗНИ: " + "♥".repeat(Math.max(0, player.lives)); 
                    if(player.lives <= 0) location.reload(); 
                }
            });

            if (player.x > 5000) { boss.active = true; document.getElementById("boss-bar").style.display = "block"; }
            if (boss.active && boss.hp > 0) {
                boss.x += boss.vx; if (boss.x < 5200 || boss.x > 6200) boss.vx *= -1;
                boss.shotTimer++; if (boss.shotTimer > 100) { fireballs.push({ x: boss.x, y: boss.y + 100, vx: -7 }); boss.shotTimer = 0; }
            }

            bullets.forEach((bull, i) => {
                bull.x += bull.vx;
                enemies.forEach(en => { if (en.alive && bull.x > en.x && bull.x < en.x + en.w && bull.y > en.y && bull.y < en.y + en.h) { en.alive = false; bullets.splice(i, 1); } });
                if (boss.active && bull.x > boss.x && bull.x < boss.x + boss.w && bull.y > boss.y && bull.y < boss.y + boss.h) { boss.hp--; bullets.splice(i, 1); document.getElementById("boss-hp").style.width = (boss.hp * 10) + "%"; }
            });

            player.state = !player.grounded ? 'jump' : (Math.abs(player.vx) > 0.5 ? 'run' : 'idle');
            lerpCameraX += (player.x - canvas.width / 2 - lerpCameraX) * 0.08;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bgs.forEach((bg, i) => { if (bg) { let x = -(lerpCameraX * (0.1 * (i+1))) % canvas.width; ctx.drawImage(bg, x, 0, canvas.width, canvas.height); ctx.drawImage(bg, x + canvas.width, 0, canvas.width, canvas.height); } });
            
            ctx.fillStyle = "#3d2516"; ctx.fillRect(0, GROUND_Y, canvas.width, 120);
            blocks.forEach(b => { ctx.fillStyle = b.type === 'joke' ? "#f1c40f" : "#3498db"; ctx.fillRect(b.x - lerpCameraX, b.y, b.w, b.h); });
            
            enemies.forEach(en => { 
                if (!en.alive) return;
                if (sprites.little) ctx.drawImage(sprites.little, en.x - lerpCameraX, en.y, en.w, en.h);
                else { ctx.fillStyle = "purple"; ctx.fillRect(en.x - lerpCameraX, en.y, en.w, en.h); }
            });
            
            if (boss.active && boss.hp > 0) {
                if (sprites.big) ctx.drawImage(sprites.big, boss.x - lerpCameraX, boss.y, boss.w, boss.h);
                else { ctx.fillStyle = "darkred"; ctx.fillRect(boss.x - lerpCameraX, boss.y, boss.w, boss.h); }
            }

            ctx.fillStyle = "yellow"; bullets.forEach(b => ctx.fillRect(b.x - lerpCameraX, b.y, 18, 6));
            ctx.fillStyle = "red"; fireballs.forEach(f => { ctx.beginPath(); ctx.arc(f.x - lerpCameraX + 15, f.y + 15, 15, 0, Math.PI*2); ctx.fill(); });

            // АНИМАЦИЯ КРИСА
            ctx.save();
            ctx.translate(player.x - lerpCameraX, player.y);
            if (player.dir === -1) { ctx.scale(-1, 1); ctx.translate(-player.w, 0); }

            if (player.state === 'idle' && sprites.idle) {
                ctx.drawImage(sprites.idle, 0, 0, player.w, player.h);
            } else {
                let current = player.state === 'run' ? anim.run : anim.jump;
                let sheet = player.state === 'run' ? sprites.runSheet : sprites.jumpSheet;
                if (sheet) {
                    player.frame += current.speed;
                    let idx = Math.floor(player.frame) % current.total;
                    let fW = sheet.width / current.cols; let fH = sheet.height / current.rows;
                    ctx.drawImage(sheet, (idx % current.cols) * fW, Math.floor(idx / current.cols) * fH, fW, fH, 0, 0, player.w, player.h);
                }
            }
            ctx.restore();
            requestAnimationFrame(draw);
        }
        setInterval(update, 1000/60); draw();
    })();
});
</script>
</body>
</html>
