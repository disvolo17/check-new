<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cyber Mario</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== ЗАГРУЗКА =====
const img = src => { let i=new Image(); i.src=src; return i; }

const sprites = {
  idle: img("idle.png"),
  run: [img("run1.png"), img("run2.png"), img("run3.png"), img("run.png")],
  jump: img("jump.png"),
  fall: img("fall.png")
};

const bg = [img("bg1.png"), img("bg2.png"), img("bg3.png")];
const coinImg = img("coin.png");
const enemyImg = img("enemy.png");
const platformImg = img("platform.png");

// ===== ИГРОК =====
const player = {
  x:100,
  y:300,
  w:64,
  h:64,
  vx:0,
  vy:0,
  speed:5,
  jump:15,
  grounded:false,
  frame:0,
  tick:0,
  hp:3
};

let keys = {};

// ===== МИР =====
let gravity = 0.8;
let cameraX = 0;
let score = 0;

// платформы
const platforms = [
  {x:0,y:500,w:2000,h:50},
  {x:300,y:400,w:200,h:20},
  {x:700,y:350,w:200,h:20},
  {x:1100,y:300,w:200,h:20},
];

// монеты
let coins = [
  {x:350,y:350},
  {x:750,y:300},
  {x:1150,y:250}
];

// враги
let enemies = [
  {x:600,y:460,w:50,h:50,vx:2,alive:true},
  {x:1000,y:460,w:50,h:50,vx:-2,alive:true}
];

// ===== УПРАВЛЕНИЕ =====
onkeydown = e => keys[e.key]=true;
onkeyup = e => keys[e.key]=false;

// ===== ФИЗИКА =====
function update(){

  // движение
  if(keys["a"]) player.vx = -player.speed;
  else if(keys["d"]) player.vx = player.speed;
  else player.vx *= 0.8;

  // прыжок
  if(keys["w"] && player.grounded){
    player.vy = -player.jump;
    player.grounded = false;
  }

  player.vy += gravity;

  player.x += player.vx;
  player.y += player.vy;

  // коллизия платформ
  player.grounded = false;
  platforms.forEach(p=>{
    if(player.x < p.x+p.w &&
       player.x+player.w > p.x &&
       player.y+player.h < p.y+20 &&
       player.y+player.h+player.vy >= p.y){

        player.y = p.y - player.h;
        player.vy = 0;
        player.grounded = true;
    }
  });

  // монеты
  coins = coins.filter(c=>{
    if(Math.abs(player.x-c.x)<40 && Math.abs(player.y-c.y)<40){
      score++;
      return false;
    }
    return true;
  });

  // враги
  enemies.forEach(e=>{
    if(!e.alive) return;

    e.x += e.vx;

    if(e.x < 0 || e.x > 2000) e.vx *= -1;

    // столкновение
    if(player.x < e.x+e.w &&
       player.x+player.w > e.x &&
       player.y < e.y+e.h &&
       player.y+player.h > e.y){

        // прыжок сверху = убийство
        if(player.vy > 0 && player.y < e.y){
          e.alive = false;
          player.vy = -10;
        } else {
          player.hp--;
          player.x -= 50;
        }
    }
  });

  // смерть
  if(player.hp <= 0){
    alert("GAME OVER");
    location.reload();
  }

  // камера
  cameraX = player.x - 200;
}

// ===== РЕНДЕР =====
function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // параллакс
  bg.forEach((b,i)=>{
    let speed = [0.2,0.5,0.8][i];
    let x = -cameraX * speed % canvas.width;

    ctx.drawImage(b, x, 0, canvas.width, canvas.height);
    ctx.drawImage(b, x+canvas.width, 0, canvas.width, canvas.height);
  });

  // платформы
  platforms.forEach(p=>{
    ctx.drawImage(platformImg, p.x-cameraX, p.y, p.w, p.h);
  });

  // монеты
  coins.forEach(c=>{
    ctx.drawImage(coinImg, c.x-cameraX, c.y, 32,32);
  });

  // враги
  enemies.forEach(e=>{
    if(e.alive)
      ctx.drawImage(enemyImg, e.x-cameraX, e.y, e.w, e.h);
  });

  // выбор спрайта
  let sprite = sprites.idle;

  if(!player.grounded){
    sprite = player.vy < 0 ? sprites.jump : sprites.fall;
  } else if(Math.abs(player.vx)>1){
    player.tick++;
    if(player.tick%10==0)
      player.frame = (player.frame+1)%sprites.run.length;

    sprite = sprites.run[player.frame];
  }

  ctx.drawImage(sprite, 200, player.y, player.w, player.h);

  // UI
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Coins: "+score, 20,30);
  ctx.fillText("HP: "+player.hp, 20,60);
}

// ===== LOOP =====
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
