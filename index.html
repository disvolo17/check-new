<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denis - PM Portfolio Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Press Start 2P', cursive; touch-action: manipulation; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 0; right: 0; color: #00ff00; font-size: 10px; text-align: center; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; line-height: 1.6; padding: 0 10px; }
        #progress { position: absolute; top: 20px; right: 20px; color: #FFD700; font-size: 10px; z-index: 10; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 40px; box-sizing: border-box; user-select: none; z-index: 20; }
        .btn { width: 65px; height: 65px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; backdrop-filter: blur(5px); }
        @media (pointer: coarse) { .controls { display: flex; } }
    </style>
</head>
<body>

<div id="ui">СОБИРАЙ МОНЕТЫ И ВЫБИВАЙ ОПЫТ!</div>
<div id="progress">COINS: 0</div>
<canvas id="game"></canvas>

<div class="controls">
    <div style="display: flex; gap: 20px;">
        <div class="btn" id="btnLeft">←</div>
        <div class="btn" id="btnRight">→</div>
    </div>
    <div class="btn" id="btnJump">UP</div>
</div>

<script>
window.addEventListener("load", () => {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const ui = document.getElementById("ui");
    const progressText = document.getElementById("progress");

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function load(src) {
        return new Promise(res => {
            const img = new Image();
            img.src = src;
            img.onload = () => res(img);
            img.onerror = () => res(null);
        });
    }

    (async function() {
        const sprites = {
            idle: await load("idle.png"),
            jump: await load("jump.png"),
            fall: await load("fall.png"),
            run: [await load("run.png"), await load("run1.png"), await load("run2.png"), await load("run3.png")],
            eIdle: await load("tank_nut_IDLE.png"),
            eHit: await load("tank_nut_HIT.png"),
            eDeath: await load("tank_nut_DEATH.png")
        };
        const bgs = [await load("bg1.png"), await load("bg2.png"), await load("bg3.png")];

        const GROUND_Y = canvas.height - 100;

        let player = {
            x: 100, y: GROUND_Y - 64, w: 64, h: 64, vx: 0, vy: 0, 
            accel: 0.8, friction: 0.85, maxSpeed: 7, gravity: 0.7, jumpPower: -15,
            grounded: false, jumps: 0, maxJumps: 2, frame: 0, dir: 1
        };

        let cameraX = 0, lerpCameraX = 0;
        let keys = { left: false, right: false };
        let coins = 0, isFinished = false;

        // Блоки опыта (Опущены до 350-400px от верха для доступности)
        let resumeBlocks = [
            { x: 800, y: GROUND_Y - 180, text: "PROJECT MANAGER - NOTION", hit: false, offset: 0 },
            { x: 1600, y: GROUND_Y - 240, text: "36 CITIES TOUR EXPERIENCE", hit: false, offset: 0 },
            { x: 2400, y: GROUND_Y - 180, text: "CREATIVE PRODUCER", hit: false, offset: 0 },
            { x: 3200, y: GROUND_Y - 240, text: "DUBAI CONFERENCE 2026", hit: false, offset: 0 },
            { x: 4200, y: GROUND_Y - 180, text: "DOWNLOAD MY CV", hit: false, offset: 0, isFile: true }
        ];

        // Монетки
        let pickupCoins = [];
        for(let i=0; i<20; i++) pickupCoins.push({ x: 500 + i*250, y: GROUND_Y - 120, collected: false });

        // Враги
        let enemies = [
            { x: 1200, y: GROUND_Y - 48, w: 48, h: 48, vx: -2, state: 'IDLE', timer: 0, alive: true },
            { x: 3000, y: GROUND_Y - 48, w: 48, h: 48, vx: -2, state: 'IDLE', timer: 0, alive: true }
        ];

        const finishLine = 5000;

        function doJump() {
            if (player.jumps < player.maxJumps && !isFinished) {
                player.vy = player.jumpPower;
                player.jumps++;
                player.grounded = false;
            }
        }

        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            if(!el) return;
            el.addEventListener("touchstart", (e) => { e.preventDefault(); if(key==='jump') doJump(); else keys[key] = true; });
            el.addEventListener("touchend", (e) => { e.preventDefault(); if(key!=='jump') keys[key] = false; });
        };
        bindBtn("btnLeft", "left"); bindBtn("btnRight", "right"); bindBtn("btnJump", "jump");
        window.addEventListener("keydown", e => { 
            if (e.code === "ArrowLeft") keys.left = true; 
            if (e.code === "ArrowRight") keys.right = true; 
            if (e.code === "Space") doJump(); 
        });
        window.addEventListener("keyup", e => { 
            if (e.code === "ArrowLeft") keys.left = false; 
            if (e.code === "ArrowRight") keys.right = false; 
        });

        function update() {
            if (!isFinished) {
                if (keys.left) { player.vx -= player.accel; player.dir = -1; }
                else if (keys.right) { player.vx += player.accel; player.dir = 1; }
                else { player.vx *= player.friction; }
            }

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            // Сплошная земля
            if (player.y + player.h > GROUND_Y) {
                player.y = GROUND_Y - player.h;
                player.vy = 0;
                player.grounded = true;
                player.jumps = 0;
            }

            // Блоки
            resumeBlocks.forEach(b => {
                b.offset *= 0.8;
                // Удар снизу
                if (player.x + player.w > b.x && player.x < b.x + 60) {
                    if (player.vy < 0 && player.y < b.y + 60 && player.y > b.y + 40) {
                        player.vy = 4; b.offset = -15;
                        if (!b.hit) { 
                            b.hit = true; 
                            ui.innerText = b.text;
                            if (b.isFile) {
                                // Скачка файла (убедись, что resume.pdf в корне)
                                const link = document.createElement('a');
                                link.href = 'resume.pdf';
                                link.download = 'Denis_Voloshin_CV.pdf';
                                link.click();
                            }
                        }
                    }
                    // Приземление сверху (Блоки твердые)
                    if (player.vy > 0 && player.y + player.h > b.y + b.offset && player.y + player.h < b.y + 20 + b.offset) {
                        player.y = b.y - player.h + b.offset;
                        player.vy = 0;
                        player.grounded = true;
                        player.jumps = 0;
                    }
                }
            });

            // Монетки
            pickupCoins.forEach(c => {
                if(!c.collected && player.x + player.w > c.x && player.x < c.x + 20 && player.y + player.h > c.y && player.y < c.y + 20) {
                    c.collected = true;
                    coins++;
                    progressText.innerText = `COINS: ${coins}`;
                }
            });

            // Враги
            enemies.forEach(en => {
                if (!en.alive && en.state !== 'DEAD') return;
                if (en.state === 'IDLE') {
                    en.x += en.vx;
                    if (en.x < en.startX - 200 || en.x > en.startX + 200) en.vx *= -1;
                }
                if (en.timer > 0) en.timer--;
                if (en.state === 'HIT' && en.timer === 0) { en.state = 'DEAD'; en.timer = 20; }
                if (en.state === 'DEAD' && en.timer === 0) en.alive = false;

                if (en.alive && en.state === 'IDLE' && player.x + player.w > en.x && player.x < en.x + en.w && player.y + player.h > en.y && player.y < en.y + en.h) {
                    if (player.vy > 0) { // Удар сверху
                        player.vy = -10;
                        en.state = 'HIT';
                        en.timer = 10;
                    } else { // Смерть игрока
                        player.x = 100;
                    }
                }
            });

            if (player.x > finishLine && !isFinished) {
                isFinished = true;
                ui.innerText = "REDIRECTING TO PORTFOLIO...";
                setTimeout(() => { window.location.href = "https://disvolo17.github.io/work/"; }, 3000);
            }

            cameraX = player.x - canvas.width / 2;
            lerpCameraX += (cameraX - lerpCameraX) * 0.1;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bgs.forEach((bg, i) => {
                if (!bg) return;
                let speed = [0.15, 0.4, 0.7][i];
                let x = -(lerpCameraX * speed) % canvas.width;
                ctx.drawImage(bg, x, 0, canvas.width, canvas.height);
                ctx.drawImage(bg, x + canvas.width, 0, canvas.width, canvas.height);
            });

            // Отрисовка сплошной земли
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(0, GROUND_Y, canvas.width, 100);
            ctx.fillStyle = "#00ff00";
            ctx.fillRect(0, GROUND_Y, canvas.width, 4);

            // Отрисовка блоков
            resumeBlocks.forEach(b => {
                ctx.save(); ctx.translate(0, b.offset);
                ctx.fillStyle = b.hit ? "#333" : "#FFD700";
                ctx.fillRect(b.x - lerpCameraX, b.y, 60, 60);
                if(!b.hit) { ctx.fillStyle="#000"; ctx.font="20px Arial"; ctx.fillText("?", b.x - lerpCameraX + 22, b.y + 38); }
                ctx.restore();
            });

            // Отрисовка монет
            ctx.fillStyle = "#FFD700";
            pickupCoins.forEach(c => { if(!c.collected) { ctx.beginPath(); ctx.arc(c.x - lerpCameraX, c.y, 8, 0, Math.PI*2); ctx.fill(); }});

            // Отрисовка врагов
            enemies.forEach(en => {
                if (!en.alive && en.state !== 'DEAD') return;
                let img = sprites.eIdle;
                if(en.state === 'HIT') img = sprites.eHit;
                if(en.state === 'DEAD') img = sprites.eDeath;
                if(img) ctx.drawImage(img, en.x - lerpCameraX, en.y, en.w, en.h);
            });

            // Игрок
            let pImg = sprites.idle;
            if (!player.grounded) pImg = (player.vy < 0) ? sprites.jump : sprites.fall;
            else if (Math.abs(player.vx) > 0.5) {
                player.frame += 0.2;
                pImg = sprites.run[Math.floor(player.frame) % 4];
            }

            ctx.save();
            if (player.dir === -1) { 
                ctx.translate(player.x - lerpCameraX + player.w, player.y); 
                ctx.scale(-1, 1); 
                ctx.drawImage(pImg || new Image(), 0, 0, player.w, player.h); 
            } else { 
                ctx.drawImage(pImg || new Image(), player.x - lerpCameraX, player.y, player.w, player.h); 
            }
            ctx.restore();

            requestAnimationFrame(draw);
        }
        setInterval(update, 1000/60); draw();
    })();
});
</script>
</body>
</html>
