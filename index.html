<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cyberpunk Mario</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== LOAD =====
function load(src){
  return new Promise((resolve)=>{
    const img = new Image();
    img.src = "./" + src;
    img.onload = ()=>resolve(img);
    img.onerror = ()=>{
      console.warn("Не загрузилось:", src);
      resolve(img); // не ломаем игру
    }
  });
}

(async () => {

// ===== ASSETS =====
const sprites = {
  idle: await load("idle.png"),
  jump: await load("jump.png"),
  fall: await load("fall.png"),
  run: [
    await load("run.png"),
    await load("run1.png"),
    await load("run2.png"),
    await load("run3.png")
  ]
};

const bg = [
  await load("image_2.png"),
  await load("image_2.png"),
  await load("image_2.png")
];

const platformImg = await load("platform.png");
const coinImg = await load("coin.png");
const enemyImg = await load("enemy.png");

// ===== STATE =====
let state = "start"; // start | game | gameover

// ===== PLAYER =====
let player = {
  x:100, y:100,
  w:64, h:64,
  vx:0, vy:0,
  jump:-14,
  gravity:0.6,
  grounded:false,
  frame:0,
  dir:1,
  coins:0,
  jumps:0,
  maxJumps:2
};

// ===== WORLD =====
let cameraX = 0;

let platforms = [];
for(let i=0;i<50;i++){
  platforms.push({
    x:i220,
    y:400 + Math.sin(i)120,
    w:200,
    h:40
  });
}

let coins = [];
for(let i=0;i<30;i++){
  coins.push({
    x:i300 + 150,
    y:250 + Math.sin(i)50,
    size:32,
    taken:false
  });
}

let enemies = [];
for(let i=0;i<20;i++){
  enemies.push({
    x:i400 + 200,
    y:350,
    w:50, h:50,
    vx:1 + Math.random(),
    alive:true
  });
}

// ===== INPUT =====
let keys = {};
addEventListener("keydown", e=>{
  keys[e.code]=true;

  if(state==="start" && e.code==="Enter"){
    state="game";
  }

  if(state==="gameover" && e.code==="Enter"){
    location.reload();
  }
});

addEventListener("keyup", e=>{
  keys[e.code]=false;
});

// ===== UPDATE =====
function update(){

if(state!=="game") return;

// движение
player.vx = 0;
if(keys["ArrowRight"]){ player.vx = 6; player.dir=1; }
if(keys["ArrowLeft"]){ player.vx = -6; player.dir=-1; }

// двойной прыжок
if(keys["Space"]){
  if(player.jumps < player.maxJumps){
    player.vy = player.jump;
    player.jumps++;
    keys["Space"] = false;
  }
}

// гравитация
player.vy += player.gravity;

player.x += player.vx;
player.y += player.vy;

// коллизии платформ
player.grounded = false;
platforms.forEach(p=>{
  if(
    player.x < p.x + p.w &&
    player.x + player.w > p.x &&
    player.y < p.y + p.h &&
    player.y + player.h > p.y
  ){
    if(player.vy > 0){
      player.y = p.y - player.h;
      player.vy = 0;
      player.grounded = true;
      player.jumps = 0;
    }
  }
});

// монеты
coins.forEach(c=>{
  if(!c.taken &&
    player.x < c.x + c.size &&
    player.x + player.w > c.x &&
    player.y < c.y + c.size &&
    player.y + player.h > c.y
  ){
    c.taken = true;
    player.coins++;
  }
});

// враги
enemies.forEach(e=>{
  if(!e.alive) return;

  e.x += e.vx;
  if(Math.random()<0.01) e.vx = -1;

  if(
    player.x < e.x + e.w &&
    player.x + player.w > e.x &&
    player.y < e.y + e.h &&
    player.y + player.h > e.y
  ){
    if(player.vy > 0){
      e.alive = false;
      player.vy = -10;
    } else {
      state = "gameover";
    }
  }
});

// падение
if(player.y > canvas.height){
  state = "gameover";
}

// камера
cameraX = player.x - canvas.width/2;
}

// ===== DRAW =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// старт экран
if(state==="start"){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  ctx.font="50px Arial";
  ctx.fillText("CYBER MARIO", canvas.width/2-180, canvas.height/2-50);

  ctx.font="25px Arial";
  ctx.fillText("Press ENTER to start", canvas.width/2-140, canvas.height/2+20);
  return;
}

// фон (параллакс)
bg.forEach((b,i)=>{
  ctx.drawImage(b, -cameraX(0.2+i0.3), 0, canvas.width*2, canvas.height);
});

// платформы
platforms.forEach(p=>{
  ctx.drawImage(platformImg, p.x-cameraX, p.y, p.w, p.h);
});

// монеты
coins.forEach(c=>{
  if(!c.taken){
    ctx.drawImage(coinImg, c.x-cameraX, c.y, c.size, c.size);
  }
});

// враги
enemies.forEach(e=>{
  if(e.alive){
    ctx.drawImage(enemyImg, e.x-cameraX, e.y, e.w, e.h);
  }
});

// игрок
let img = sprites.idle;

if(!player.grounded){
  img = player.vy < 0 ? sprites.jump : sprites.fall;
}
else if(player.vx !== 0){
  player.frame += 0.15;
  img = sprites.run[Math.floor(player.frame) % sprites.run.length];
}

ctx.save();
if(player.dir===-1){
  ctx.scale(-1,1);
  ctx.drawImage(img, -(player.x-cameraX)-player.w, player.y, player.w, player.h);
}else{
  ctx.drawImage(img, player.x-cameraX, player.y, player.w, player.h);
}
ctx.restore();

// UI
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Coins: " + player.coins, 20,30);

// game over
if(state==="gameover"){
  ctx.fillStyle="red";
  ctx.font="50px Arial";
  ctx.fillText("GAME OVER", canvas.width/2-150, canvas.height/2);

  ctx.font="20px Arial";
  ctx.fillText("Press ENTER to restart", canvas.width/2-110, canvas.height/2+40);
}
}

// ===== LOOP =====
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

})();
</script>

</body>
</html>
