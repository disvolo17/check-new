<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disvolo17 - Cyber City Level</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00f2ff;
            --neon-yellow: #fff200;
            --bg-dark: #050510;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { display: block; }

        .ui { position: absolute; top: 20px; left: 20px; color: var(--neon-blue); pointer-events: none; z-index: 10; text-shadow: 0 0 10px var(--neon-blue); }
        .score-box { font-size: 20px; margin-bottom: 5px; }
        
        .modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 30, 0.95); border: 1px solid var(--neon-blue);
            padding: 30px; color: white; display: none; z-index: 100;
            width: 80%; max-width: 400px; text-align: center; border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2); backdrop-filter: blur(10px);
        }

        .controls { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-around; z-index: 20; padding: 0 20px; box-sizing: border-box; }
        .btn { width: 65px; height: 65px; background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon-blue); border-radius: 50%; color: var(--neon-blue); display: flex; align-items: center; justify-content: center; font-size: 20px; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui">
        <div class="score-box">SYSTEM XP: <span id="xp-val">2500</span></div>
        <div style="font-size: 10px; letter-spacing: 2px;">LOCATION: NEON_DUBAI_SCTOR_17</div>
    </div>

    <div id="modal" class="modal">
        <h2 id="m-title" style="color:var(--neon-blue); margin-top:0;"></h2>
        <p id="m-body" style="line-height:1.6; font-size:14px;"></p>
        <button onclick="closeModal()" style="background:none; border:1px solid var(--neon-pink); color:var(--neon-pink); padding:8px 20px; cursor:pointer; font-family:'Orbitron';">DISMISS</button>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <div style="display:flex; gap:15px;">
            <div class="btn" id="l-btn">L</div>
            <div class="btn" id="r-btn">R</div>
        </div>
        <div class="btn" id="j-btn" style="border-color:var(--neon-pink); color:var(--neon-pink);">JMP</div>
    </div>
</div>

<script>
/**
 * КОНФИГУРАЦИЯ И ДАННЫЕ
 */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let cw, ch;

const RESUME = {
    exp: { t: "LOG: EXPERIENCE", b: "Project Manager & Developer. 2 years of creating digital ecosystems and interactive art." },
    stack: { t: "LOG: TECH_STACK", b: "Core: JavaScript, React, Vue. Support: Prompt Engineering, UI/UX Design." }
};

const state = {
    camX: 0,
    xp: 2500,
    modalOpen: false,
    keys: { l: false, r: false, j: false },
    frame: 0
};

const player = {
    x: 100, y: 0, w: 28, h: 45, vx: 0, vy: 0, 
    speed: 5.5, jump: -14, grounded: false
};

const level = {
    platforms: [],
    coins: [],
    enemies: [],
    decor: []
};

/**
 * ИНИЦИАЛИЗАЦИЯ УРОВНЯ
 */
function init() {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight;
    player.y = ch - 200;

    // Платформы (в стиле Light Up)
    addPlatform(0, ch - 60, 4000, 60); // Земля
    addPlatform(400, ch - 220, 200, 25, RESUME.exp);
    addPlatform(750, ch - 380, 180, 25, RESUME.stack);
    addPlatform(1100, ch - 250, 250, 25);
    addPlatform(1500, ch - 400, 150, 25);

    // Монетки
    for(let i=0; i<15; i++) {
        level.coins.push({ x: 500 + i*250, y: ch - 300 - Math.random()*200, r: 8, collected: false });
    }

    // Враги (Дроны)
    level.enemies.push({ x: 1100, y: ch - 250 - 30, w: 30, h: 20, range: 200, startX: 1100, dir: 1, speed: 2 });
    level.enemies.push({ x: 2000, y: ch - 60 - 30, w: 30, h: 20, range: 500, startX: 2000, dir: 1, speed: 3 });

    // Декор (Здания на фоне)
    for(let i=0; i<15; i++) {
        level.decor.push({ x: i*400, y: ch-600, w: 200, h: 600, speed: 0.2 + Math.random()*0.3 });
    }

    loop();
}

function addPlatform(x, y, w, h, data = null) {
    level.platforms.push({ x, y, w, h, data, hit: false });
}

/**
 * ЛОГИКА
 */
function update() {
    if(state.modalOpen) return;
    state.frame++;

    // Движение
    if(state.keys.l) player.vx = -player.speed;
    else if(state.keys.r) player.vx = player.speed;
    else player.vx *= 0.85;

    if(state.keys.j && player.grounded) {
        player.vy = player.jump;
        player.grounded = false;
    }

    player.vy += 0.7; // Гравитация
    player.x += player.vx;
    player.y += player.vy;

    // Камера
    state.camX += (player.x - state.camX - cw/3) * 0.1;

    // Коллизии с платформами
    player.grounded = false;
    level.platforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x &&
           player.y + player.h > p.y && player.y < p.y + p.h) {
            if(player.vy > 0 && player.y + player.h - player.vy <= p.y) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.grounded = true;
                if(p.data && !p.hit) { showModal(p.data); p.hit = true; }
            }
        }
    });

    // Сбор монеток
    level.coins.forEach(c => {
        if(!c.collected && Math.hypot(player.x + player.w/2 - c.x, player.y + player.h/2 - c.y) < 30) {
            c.collected = true;
            state.xp += 100;
            document.getElementById('xp-val').innerText = state.xp;
        }
    });

    // Враги
    level.enemies.forEach(e => {
        e.x += e.dir * e.speed;
        if(Math.abs(e.x - e.startX) > e.range) e.dir *= -1;

        // Столкновение с врагом
        if(player.x < e.x + e.w && player.x + player.w > e.x &&
           player.y < e.y + e.h && player.y + player.h > e.y) {
            state.xp -= 50;
            player.x = 100; player.y = ch - 200; // Респаун
            document.getElementById('xp-val').innerText = state.xp;
        }
    });

    if(player.y > ch + 100) { player.x = 100; player.y = ch-200; }
}

/**
 * ОТРИСОВКА
 */
function draw() {
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, cw, ch);

    // 1. Фон (Параллакс)
    level.decor.forEach(d => {
        ctx.fillStyle = '#0a0a20';
        ctx.fillRect(d.x - state.camX * d.speed, d.y, d.w, d.h);
        // Окна
        ctx.fillStyle = 'rgba(0, 242, 255, 0.05)';
        for(let j=0; j<5; j++) ctx.fillRect(d.x - state.camX * d.speed + 20, d.y + 50 + j*100, d.w-40, 40);
    });

    ctx.save();
    ctx.translate(-state.camX, 0);

    // 2. Блоки Платформ (Кибер-дизайн)
    level.platforms.forEach(p => {
        // Основной блок
        ctx.fillStyle = 'rgba(10, 10, 40, 0.8)';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        
        // Свечение краев
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.data ? varColor('--neon-pink') : varColor('--neon-blue');
        ctx.strokeStyle = p.data ? varColor('--neon-pink') : varColor('--neon-blue');
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x, p.y, p.w, p.h);
        
        // Внутренняя сетка блока
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.1)';
        ctx.beginPath();
        for(let x=20; x<p.w; x+=40) { ctx.moveTo(p.x+x, p.y); ctx.lineTo(p.x+x, p.y+p.h); }
        ctx.stroke();
    });

    // 3. Монетки
    level.coins.forEach(c => {
        if(c.collected) return;
        ctx.shadowBlur = 15;
        ctx.shadowColor = varColor('--neon-yellow');
        ctx.strokeStyle = varColor('--neon-yellow');
        ctx.lineWidth = 3;
        const bob = Math.sin(state.frame * 0.1) * 5;
        ctx.beginPath();
        ctx.arc(c.x, c.y + bob, c.r * Math.abs(Math.cos(state.frame * 0.1)), 0, Math.PI * 2);
        ctx.stroke();
    });

    // 4. Враги (Дроны)
    level.enemies.forEach(e => {
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'red';
        ctx.fillStyle = '#1a0000';
        ctx.fillRect(e.x, e.y, e.w, e.h);
        // Глаз дрона
        ctx.fillStyle = 'red';
        ctx.fillRect(e.x + (e.dir > 0 ? 20 : 5), e.y + 5, 5, 5);
    });

    // 5. Игрок
    ctx.shadowBlur = 20;
    ctx.shadowColor = varColor('--neon-blue');
    ctx.fillStyle = '#000';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.strokeStyle = varColor('--neon-blue');
    ctx.lineWidth = 2;
    ctx.strokeRect(player.x, player.y, player.w, player.h);

    ctx.restore();
}

function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

function loop() { update(); draw(); requestAnimationFrame(loop); }

function showModal(data) {
    state.modalOpen = true;
    document.getElementById('m-title').innerText = data.t;
    document.getElementById('m-body').innerText = data.b;
    document.getElementById('modal').style.display = 'block';
}

function closeModal() {
    state.modalOpen = false;
    document.getElementById('modal').style.display = 'none';
}

/**
 * УПРАВЛЕНИЕ
 */
const setupControl = (id, key) => {
    const el = document.getElementById(id);
    const start = (e) => { e.preventDefault(); state.keys[key] = true; if(state.modalOpen) closeModal(); };
    const end = (e) => { e.preventDefault(); state.keys[key] = false; };
    el.onmousedown = el.ontouchstart = start;
    el.onmouseup = el.ontouchend = end;
};
setupControl('l-btn', 'l'); setupControl('r-btn', 'r'); setupControl('j-btn', 'j');

window.onload = init;
window.onresize = () => { cw=canvas.width=window.innerWidth; ch=canvas.height=window.innerHeight; };
</script>

</body>
</html>
