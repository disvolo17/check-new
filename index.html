<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Resume Game</title>
    <style>
        body { margin: 0; background: #222; font-family: 'Courier New', Courier, monospace; overflow: hidden; color: white; }
        canvas { display: block; background: #3a5a3a; margin: 0 auto; image-rendering: pixelated; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
              background: rgba(0,0,0,0.8); padding: 20px; border: 4px solid #fff; 
              width: 80%; max-width: 600px; display: none; }
        .instructions { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="instructions">Управление: СТРЕЛКИ / WASD. Взаимодействие: ПРОБЕЛ</div>
<div id="ui">
    <div id="ui-title" style="font-weight: bold; color: #ff0; margin-bottom: 10px;"></div>
    <div id="ui-content"></div>
    <div style="font-size: 10px; margin-top: 10px; color: #aaa;">Нажмите Пробел, чтобы закрыть</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/** * ДАННЫЕ ВАШЕГО РЕЗЮМЕ 
 * (Замените текст ниже на свой с сайта disvolo17.github.io/work/)
 */
const RESUME_DATA = {
    intro: {
        title: "КТО Я?",
        text: "Привет! Я [Ваше Имя]. Разработчик и творец. Добро пожаловать в мой мир!"
    },
    skills: {
        title: "НАВЫКИ (SKILLS)",
        text: "• Frontend: React, Vue, HTML/CSS\n• Backend: Node.js, Python\n• Tools: Git, Docker, Figma"
    },
    experience: {
        title: "ОПЫТ РАБОТЫ",
        text: "2022 - н.в.: Senior Developer в 'Super Company'\n2020 - 2022: Junior в 'StartUp Inc'"
    },
    contacts: {
        title: "КОНТАКТЫ",
        text: "GitHub: disvolo17\nEmail: your@email.com\nTelegram: @yourname"
    }
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const uiTitle = document.getElementById('ui-title');
const uiContent = document.getElementById('ui-content');

canvas.width = 800;
canvas.height = 600;

const player = { x: 400, y: 300, size: 32, speed: 4, color: '#00ff00' };
const keys = {};
let activeDialog = null;

// Объекты на карте (NPC/Зоны)
const points = [
    { x: 150, y: 150, size: 40, color: '#ff5555', label: 'ОБО МНЕ', data: RESUME_DATA.intro },
    { x: 600, y: 150, size: 40, color: '#5555ff', label: 'НАВЫКИ', data: RESUME_DATA.skills },
    { x: 150, y: 450, size: 40, color: '#ffff55', label: 'ОПЫТ', data: RESUME_DATA.experience },
    { x: 600, y: 450, size: 40, color: '#ff55ff', label: 'СВЯЗЬ', data: RESUME_DATA.contacts },
];

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') handleInteraction();
});
window.addEventListener('keyup', e => keys[e.code] = false);

function handleInteraction() {
    if (activeDialog) {
        activeDialog = null;
        ui.style.display = 'none';
        return;
    }
    
    points.forEach(p => {
        const dist = Math.hypot(player.x - p.x, player.y - p.y);
        if (dist < 60) {
            activeDialog = p.data;
            uiTitle.innerText = p.data.title;
            uiContent.innerText = p.data.text;
            ui.style.display = 'block';
        }
    });
}

function update() {
    if (activeDialog) return;

    if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
    if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;

    // Границы
    player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Рисуем сетку (для стиля)
    ctx.strokeStyle = '#446644';
    for(let i=0; i<canvas.width; i+=40) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
    }
    for(let i=0; i<canvas.height; i+=40) {
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
    }

    // Рисуем точки интереса
    points.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - 20, p.y - 20, 40, 40);
        ctx.fillStyle = 'white';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(p.label, p.x, p.y - 30);
        
        // Подсказка "Нажми пробел"
        const dist = Math.hypot(player.x - p.x, player.y - p.y);
        if (dist < 60) {
            ctx.fillText("[ПРОБЕЛ]", p.x, p.y + 40);
        }
    });

    // Рисуем игрока (пиксельный человечек)
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.size, player.size);
    ctx.fillStyle = 'black';
    ctx.fillRect(player.x + 6, player.y + 8, 6, 6); // Глаза
    ctx.fillRect(player.x + 20, player.y + 8, 6, 6);

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

draw();
</script>
</body>
</html>
