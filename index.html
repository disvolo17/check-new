<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Adventure - Dubai Edition</title>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { background: #2d2d44; border: 4px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 20px; color: white; text-shadow: 2px 2px #000; pointer-events: none; width: 800px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="ui">
    <div>HP: 100</div>
    <div id="boss-hp" style="display:none;">BOSS: 10/10</div>
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 400;

const jokes = [
    "Почему программисты не любят природу? Там слишком много багов!",
    "Заходит улитка в бар... но её выставили, потому что она 'тормозит'!",
    "В чем разница между JS и Java? Как между конем и подоконником.",
    "Сынок, ты стал совсем взрослым, пора тебе сказать: HTML — это не язык программирования."
];

// Настройки
const config = {
    gravity: 0.5,
    speed: 4,
    jumpPower: -10,
    bulletSpeed: 7
};

let player = {
    x: 50, y: 300, w: 40, h: 70, // Вытянули героя вверх
    vx: 0, vy: 0,
    isJumping: false,
    color: '#00ffcc'
};

let enemies = [
    { x: 300, y: 330, w: 30, h: 30, name: 'Little.png', dir: 1 },
    { x: 500, y: 330, w: 30, h: 30, name: 'Little.png', dir: -1 }
];

let boss = { x: 700, y: 250, w: 80, h: 120, hp: 10, active: false, name: 'big.png' };
let bullets = [];
let particles = [];
let keys = {};

// Управление
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

function createFirework(x, y) {
    for(let i=0; i<15; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            life: 30,
            color: `hsl(${Math.random() * 360}, 100%, 50%)`
        });
    }
    console.log("%c" + jokes[Math.floor(Math.random() * jokes.length)], "color: yellow; font-weight: bold;");
}

function update() {
    // Движение героя (A - влево, D - вправо, W - прыжок)
    player.vx = 0;
    if (keys['KeyS']) player.vx = -config.speed; // По запросу S - влево
    if (keys['KeyD']) player.vx = config.speed;
    if (keys['KeyW'] && !player.isJumping) {
        player.vy = config.jumpPower;
        player.isJumping = true;
    }
    
    // Стрельба
    if (keys['Space']) {
        if (bullets.length < 5) {
            bullets.push({ x: player.x + player.w, y: player.y + 30, vx: config.bulletSpeed });
            keys['Space'] = false; // Ограничение темпа
        }
    }

    // Физика
    player.x += player.vx;
    player.vy += config.gravity;
    player.y += player.vy;

    if (player.y > 330) {
        player.y = 330;
        player.vy = 0;
        player.isJumping = false;
    }

    // Враги Little.png
    enemies.forEach((en, index) => {
        en.x += en.dir * 2;
        if (en.x > 600 || en.x < 200) en.dir *= -1;
        
        // Попадание
        bullets.forEach((b, bi) => {
            if (b.x > en.x && b.x < en.x + en.w && b.y > en.y && b.y < en.y + en.h) {
                createFirework(en.x, en.y);
                enemies.splice(index, 1);
                bullets.splice(bi, 1);
            }
        });
    });

    // Босс
    if (enemies.length === 0) {
        boss.active = true;
        document.getElementById('boss-hp').style.display = 'block';
    }

    if (boss.active) {
        bullets.forEach((b, bi) => {
            if (b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
                boss.hp--;
                bullets.splice(bi, 1);
                createFirework(boss.x + 40, boss.y + 60);
                document.getElementById('boss-hp').innerText = `BOSS: ${boss.hp}/10`;
                if (boss.hp <= 0) boss.active = false;
            }
        });
    }

    bullets.forEach((b, i) => {
        b.x += b.vx;
        if (b.x > canvas.width) bullets.splice(i, 1);
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Пол
    ctx.fillStyle = '#444';
    ctx.fillRect(0, 370, canvas.width, 30);

    // Игрок
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = "white"; // Глаза
    ctx.fillRect(player.x + 25, player.y + 15, 5, 5);

    // Враги
    ctx.fillStyle = '#ff5555';
    enemies.forEach(en => {
        ctx.fillRect(en.x, en.y, en.w, en.h);
        ctx.fillStyle = "black";
        ctx.fillText(en.name, en.x - 10, en.y - 5);
        ctx.fillStyle = '#ff5555';
    });

    // Босс
    if (boss.active && boss.hp > 0) {
        ctx.fillStyle = '#9900ff';
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        ctx.fillStyle = "white";
        ctx.fillText(boss.name, boss.x + 20, boss.y - 10);
    }

    // Пули
    ctx.fillStyle = 'yellow';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 10, 5));

    // Салют
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3, 3);
    });

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

draw();
</script>
</body>
</html>
