<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denis - PM Dubai Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ff0000; font-size: 18px; z-index: 10; text-shadow: 2px 2px #000; }
        #joke-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); color: #00ff00; display: none; 
            align-items: center; justify-content: center; text-align: center; 
            font-size: 24px; padding: 40px; z-index: 100; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="ui">ЖИЗНИ: ♥♥♥</div>
<div id="joke-screen">АНЕКДОТ</div>
<canvas id="game"></canvas>

<script>
window.addEventListener("load", () => {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const jokeScreen = document.getElementById("joke-screen");

    const jokes = [
        "ПРОДЖЕКТ-МЕНЕДЖЕР — ЭТО ЧЕЛОВЕК, КОТОРЫЙ СЧИТАЕТ, ЧТО 9 ЖЕНЩИН РОДЯТ РЕБЕНКА ЗА МЕСЯЦ!",
        "ЗАКАЗЧИК: 'НУЖНО ВЧЕРА'. ПМ: 'ВОТ ВАМ СЧЕТ ИЗ БУДУЩЕГО!'",
        "БЭКЛОГ — ЭТО КЛАДБИЩЕ ИДЕЙ, КОТОРЫЕ УБИЛ БЮДЖЕТ!",
        "ДЕБАТЫ ПМ-А: МЫ НЕ ОПАЗДЫВАЕМ, МЫ ПЕРЕОСМЫСЛИВАЕМ ВРЕМЯ!",
        "У НАС НЕТ БАГОВ, ЭТО НЕЗАДОКУМЕНТИРОВАННЫЕ ФИЧИ!"
    ];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function load(src) {
        return new Promise(res => {
            const img = new Image();
            img.src = src;
            img.onload = () => res(img);
            img.onerror = () => res(null);
        });
    }

    (async function() {
        const sprites = {
            player: await load("player.png") || await load("idle.png"),
            little: await load("Little.png"),
        };

        const GROUND_Y = canvas.height - 100;

        let player = {
            x: 100, y: GROUND_Y - 140, w: 70, h: 140,
            vx: 0, vy: 0, speed: 6, gravity: 0.8, jump: -18,
            jumps: 0, lives: 3, dir: 1
        };

        // 5 МАЛЕНЬКИХ ВРАГОВ (РАССТАВЛЕНЫ БЛИЗКО)
        let enemies = [
            { x: 700, y: GROUND_Y - 60, w: 60, h: 60, vx: -3, alive: true },
            { x: 1300, y: GROUND_Y - 60, w: 60, h: 60, vx: -3, alive: true },
            { x: 2000, y: GROUND_Y - 60, w: 60, h: 60, vx: -3, alive: true },
            { x: 2800, y: GROUND_Y - 60, w: 60, h: 60, vx: -3, alive: true },
            { x: 3500, y: GROUND_Y - 60, w: 60, h: 60, vx: -3, alive: true }
        ];

        // 5 КУБИКОВ С АНЕКДОТАМИ
        let blocks = [
            { x: 500, y: GROUND_Y - 280, hit: false },
            { x: 1100, y: GROUND_Y - 320, hit: false },
            { x: 1800, y: GROUND_Y - 280, hit: false },
            { x: 2500, y: GROUND_Y - 320, hit: false },
            { x: 3200, y: GROUND_Y - 280, hit: false }
        ];

        let cameraX = 0;
        let keys = {};

        window.onkeydown = (e) => {
            keys[e.code] = true;
            if(e.code === "KeyW" && player.jumps < 2) {
                player.vy = player.jump;
                player.jumps++;
            }
        };
        window.onkeyup = (e) => keys[e.code] = false;

        function update() {
            if (keys["KeyD"]) { player.vx = player.speed; player.dir = 1; }
            else if (keys["KeyA"]) { player.vx = -player.speed; player.dir = -1; }
            else { player.vx *= 0.85; }

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            // Пол
            if (player.y + player.h > GROUND_Y) {
                player.y = GROUND_Y - player.h;
                player.vy = 0;
                player.jumps = 0;
            }

            // Удары по кубикам
            blocks.forEach(b => {
                if (!b.hit && player.x + player.w > b.x && player.x < b.x + 80 && player.vy < 0 && player.y < b.y + 80 && player.y > b.y) {
                    b.hit = true;
                    player.vy = 5;
                    jokeScreen.innerText = jokes[Math.floor(Math.random() * jokes.length)];
                    jokeScreen.style.display = "flex";
                    setTimeout(() => jokeScreen.style.display = "none", 3000);
                }
            });

            // Враги Little
            enemies.forEach(en => {
                if(!en.alive) return;
                en.x += en.vx;
                if(en.x < 100 || en.x > 5000) en.vx *= -1;

                if(player.x < en.x + en.w && player.x + player.w > en.x && player.y < en.y + en.h && player.y + player.h > en.y) {
                    player.lives--;
                    player.x -= 250;
                    document.getElementById("ui").innerText = "ЖИЗНИ: " + "♥".repeat(player.lives);
                    if(player.lives <= 0) location.reload();
                }
            });

            cameraX += (player.x - cameraX - canvas.width/3) * 0.1;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Отрисовка пола
            ctx.fillStyle = "#3d2516";
            ctx.fillRect(0, GROUND_Y, canvas.width, 100);
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(0, GROUND_Y, canvas.width, 10);

            // Кубики
            blocks.forEach(b => {
                ctx.fillStyle = b.hit ? "#333" : "#f1c40f";
                ctx.fillRect(b.x - cameraX, b.y, 80, 80);
                if(!b.hit) {
                    ctx.fillStyle = "#000";
                    ctx.font = "bold 10px Arial";
                    ctx.fillText("УДАРЬ МЕНЯ", b.x - cameraX + 5, b.y + 45);
                }
            });

            // Враги Little
            enemies.forEach(en => {
                if(!en.alive) return;
                if(sprites.little) {
                    ctx.drawImage(sprites.little, en.x - cameraX, en.y, en.w, en.h);
                } else {
                    ctx.fillStyle = "purple"; // Запасной вариант если нет картинки
                    ctx.fillRect(en.x - cameraX, en.y, en.w, en.h);
                }
            });

            // Игрок
            ctx.save();
            if(player.dir === -1) {
                ctx.translate(player.x - cameraX + player.w, player.y);
                ctx.scale(-1, 1);
                ctx.drawImage(sprites.player || new Image(), 0, 0, player.w, player.h);
            } else {
                ctx.drawImage(sprites.player || new Image(), player.x - cameraX, player.y, player.w, player.h);
            }
            ctx.restore();

            requestAnimationFrame(draw);
        }
        setInterval(update, 1000/60); 
        draw();
    })();
});
</script>
</body>
</html>
