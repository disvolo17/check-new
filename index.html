<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denis - PM Dubai Action Game (Final Fix)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; touch-action: manipulation; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; }
        #lives { color: #ff0000; font-size: 20px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="ui-layer"><div id="lives">ЖИЗНИ: ♥♥♥</div></div>
<canvas id="game"></canvas>

<script>
window.addEventListener("load", () => {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    function load(src) {
        return new Promise(res => {
            const img = new Image(); img.src = src;
            img.onload = () => res(img); img.onerror = () => res(null);
        });
    }

    (async function() {
        // Загружаем твои PNG файлы
        const sprites = {
            idle: await load("idle.png"),
            runSheet: await load("run_sheet.png"),
            jumpSheet: await load("jump_sheet.png")
        };
        const bgs = [await load("bg1.png"), await load("bg2.png"), await load("bg3.png")];

        const GROUND_Y = canvas.height - 120;
        let player = {
            x: 150, y: GROUND_Y - 140, w: 90, h: 140, 
            vx: 0, vy: 0, accel: 0.8, friction: 0.85, maxSpeed: 7, gravity: 0.8, jumpPower: -19,
            grounded: false, jumps: 0, maxJumps: 2, frame: 0, dir: 1, state: 'idle'
        };

        // Настройки анимации под ТВОИ сетки
        const anim = {
            run: { cols: 4, rows: 3, total: 12, speed: 0.2 }, // 4x3
            jump: { cols: 4, rows: 2, total: 8, speed: 0.15 } // 4x2
        };

        let lerpCameraX = 0;
        let keys = { a: false, d: false };

        window.addEventListener("keydown", e => {
            if (e.code === "KeyA") keys.a = true;
            if (e.code === "KeyD") keys.d = true;
            if (e.code === "KeyW" && player.jumps < player.maxJumps) {
                player.vy = player.jumpPower; player.jumps++; player.grounded = false; player.frame = 0;
            }
        });
        window.addEventListener("keyup", e => { if (e.code === "KeyA") keys.a = false; if (e.code === "KeyD") keys.d = false; });

        function update() {
            if (keys.a) { player.vx -= player.accel; player.dir = -1; }
            else if (keys.d) { player.vx += player.accel; player.dir = 1; }
            else { player.vx *= player.friction; }
            player.vy += player.gravity; player.x += player.vx; player.y += player.vy;

            if (player.y + player.h > GROUND_Y) {
                player.y = GROUND_Y - player.h; player.vy = 0; player.grounded = true; player.jumps = 0;
            } else { player.grounded = false; }

            player.state = !player.grounded ? 'jump' : (Math.abs(player.vx) > 0.5 ? 'run' : 'idle');
            lerpCameraX += (player.x - canvas.width / 2 - lerpCameraX) * 0.08;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bgs.forEach((bg, i) => { if (bg) { let x = -(lerpCameraX * (0.1 * (i+1))) % canvas.width; ctx.drawImage(bg, x, 0, canvas.width, canvas.height); ctx.drawImage(bg, x + canvas.width, 0, canvas.width, canvas.height); } });
            ctx.fillStyle = "#3d2516"; ctx.fillRect(0, GROUND_Y, canvas.width, 120);

            ctx.save();
            ctx.translate(player.x - lerpCameraX, player.y);
            if (player.dir === -1) { ctx.scale(-1, 1); ctx.translate(-player.w, 0); }

            if (player.state === 'idle' && sprites.idle) {
                ctx.drawImage(sprites.idle, 0, 0, player.w, player.h);
            } else {
                let current = player.state === 'run' ? anim.run : anim.jump;
                let sheet = player.state === 'run' ? sprites.runSheet : sprites.jumpSheet;
                
                if (sheet) {
                    player.frame += current.speed;
                    let frameIdx = Math.floor(player.frame) % current.total;
                    if (player.state === 'jump' && player.frame >= current.total) frameIdx = current.total - 1;

                    // Самый важный момент: вычисляем координаты кадра в сетке
                    let frameW = sheet.width / current.cols;
                    let frameH = sheet.height / current.rows;
                    let col = frameIdx % current.cols;
                    let row = Math.floor(frameIdx / current.cols);

                    ctx.drawImage(sheet, col * frameW, row * frameH, frameW, frameH, 0, 0, player.w, player.h);
                }
            }
            ctx.restore();
            requestAnimationFrame(draw);
        }
        setInterval(update, 1000/60); draw();
    })();
});
</script>
</body>
</html>
