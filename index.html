<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denis - PM & Creative CV</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Press Start 2P', cursive; touch-action: manipulation; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 0; right: 0; color: #00ff00; font-size: 10px; text-align: center; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; line-height: 1.6; padding: 0 10px; }
        #progress { position: absolute; top: 20px; right: 20px; color: #FFD700; font-size: 10px; z-index: 10; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 40px; box-sizing: border-box; user-select: none; z-index: 20; }
        .btn { width: 65px; height: 65px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; backdrop-filter: blur(5px); }
        .btn:active { background: rgba(0, 255, 0, 0.3); transform: scale(0.9); }
        @media (pointer: coarse) { .controls { display: flex; } }
    </style>
</head>
<body>

<div id="ui">РАЗБИВАЙ БЛОКИ, ЧТОБЫ УЗНАТЬ ОПЫТ ДЕНИСА</div>
<div id="progress">0/7</div>
<canvas id="game"></canvas>

<div class="controls">
    <div style="display: flex; gap: 20px;">
        <div class="btn" id="btnLeft">←</div>
        <div class="btn" id="btnRight">→</div>
    </div>
    <div class="btn" id="btnJump">UP</div>
</div>

<script>
window.addEventListener("load", () => {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const ui = document.getElementById("ui");
    const progressText = document.getElementById("progress");

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function load(src) {
        return new Promise(res => {
            const img = new Image();
            img.src = src;
            img.onload = () => res(img);
            img.onerror = () => res(null);
        });
    }

    (async function() {
        const sprites = {
            idle: await load("idle.png"),
            jump: await load("jump.png"),
            fall: await load("fall.png"),
            run: [await load("run.png"), await load("run1.png"), await load("run2.png"), await load("run3.png")]
        };
        const bgs = [await load("bg1.png"), await load("bg2.png"), await load("bg3.png")];
        const platformImg = await load("platform.png");

        let player = {
            x: 100, y: 100, w: 64, h: 64, vx: 0, vy: 0, 
            accel: 0.8, friction: 0.85, maxSpeed: 7, gravity: 0.7, jumpPower: -15,
            grounded: false, jumps: 0, maxJumps: 2, frame: 0, dir: 1
        };

        let cameraX = 0, lerpCameraX = 0;
        let keys = { left: false, right: false };
        let blocksHitCount = 0, isFinished = false, fireworks = [];

        let resumeBlocks = [
            { x: 700, y: 350, text: "ДЕНИС — PROJECT MANAGER & CREATIVE PRODUCER", hit: false, offset: 0 },
            { x: 1400, y: 280, text: "ЭКСПЕРТИЗА: РАБОТА С ТОПОВЫМИ АРТИСТАМИ", hit: false, offset: 0 },
            { x: 2100, y: 350, text: "ТУРЫ: ОРГАНИЗАЦИЯ КОНЦЕРТОВ И ЛОГИСТИКА", hit: false, offset: 0 },
            { x: 2800, y: 280, text: "MANAGEMENT: ВЕДЕНИЕ КРЕАТИВНЫХ ПРОЕКТОВ", hit: false, offset: 0 },
            { x: 3500, y: 350, text: "SKILLS: БЮДЖЕТЫ, КОМАНДА, ДЕДЛАЙНЫ", hit: false, offset: 0 },
            { x: 4200, y: 280, text: "ШОУ: СОЗДАНИЕ МАСШТАБНОГО КОНТЕНТА", hit: false, offset: 0 },
            { x: 4900, y: 350, text: "TG: @disvolo | DISVOLO17.GITHUB.IO", hit: false, offset: 0 }
        ];

        let platforms = [];
        for (let i = 0; i < 100; i++) {
            platforms.push({ x: i * 320, y: canvas.height - 180 + Math.sin(i * 0.7) * 60, w: 220, h: 35 });
        }

        const finishLine = 5600;

        function createFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height / 2);
            const colors = ['#0f0', '#ff0', '#f0f', '#0ff', '#fff'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 20; i++) {
                fireworks.push({
                    x, y, 
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1.0, color
                });
            }
        }

        function doJump() {
            if (player.jumps < player.maxJumps && !isFinished) {
                player.vy = player.jumpPower;
                player.jumps++;
            }
        }

        // Кнопки
        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener("touchstart", (e) => { e.preventDefault(); if(key==='jump') doJump(); else keys[key] = true; });
            el.addEventListener("touchend", (e) => { e.preventDefault(); if(key!=='jump') keys[key] = false; });
        };
        bindBtn("btnLeft", "left"); bindBtn("btnRight", "right"); bindBtn("btnJump", "jump");
        window.addEventListener("keydown", e => { if (e.code === "ArrowLeft") keys.left = true; if (e.code === "ArrowRight") keys.right = true; if (e.code === "Space") doJump(); });
        window.addEventListener("keyup", e => { if (e.code === "ArrowLeft") keys.left = false; if (e.code === "ArrowRight") keys.right = false; });

        function update() {
            if (!isFinished) {
                if (keys.left) { player.vx -= player.accel; player.dir = -1; }
                else if (keys.right) { player.vx += player.accel; player.dir = 1; }
                else { player.vx *= player.friction; }
            } else {
                player.vx *= 0.9; // Тормозим на финише
                if (player.grounded) player.vy = -12; // Прыгаем от радости
                if (Math.random() < 0.1) createFirework();
            }

            if (player.vx > player.maxSpeed) player.vx = player.maxSpeed;
            if (player.vx < -player.maxSpeed) player.vx = -player.maxSpeed;

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            player.grounded = false;
            platforms.forEach(p => {
                if (player.x + 15 < p.x + p.w && player.x + player.w - 15 > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 25) {
                    if (player.vy > 0) { player.y = p.y - player.h; player.vy = 0; player.grounded = true; player.jumps = 0; }
                }
            });

            resumeBlocks.forEach(b => {
                b.offset *= 0.8;
                if (player.x + player.w > b.x && player.x < b.x + 60 && player.y < b.y + 60 + b.offset && player.y + player.h > b.y + b.offset) {
                    if (player.vy < 0 && player.y > b.y + 20) {
                        player.vy = 4; b.offset = -15;
                        if (!b.hit) { b.hit = true; blocksHitCount++; progressText.innerText = `${blocksHitCount}/7`; }
                        ui.innerText = b.text;
                    }
                }
            });

            if (player.x > finishLine && !isFinished) {
                isFinished = true;
                ui.style.color = "#FFD700";
                ui.innerText = "DENIS IS READY FOR YOUR PROJECT!";
                setTimeout(() => { window.location.href = "https://disvolo17.github.io/work/"; }, 4000);
            }

            if (player.y > canvas.height + 200) { player.x = 100; player.y = 100; player.vx = 0; player.vy = 0; }
            cameraX = player.x - canvas.width / 2;
            lerpCameraX += (cameraX - lerpCameraX) * 0.1;

            fireworks.forEach((f, i) => {
                f.x += f.vx; f.y += f.vy; f.life -= 0.02;
                if (f.life <= 0) fireworks.splice(i, 1);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bgs.forEach((bg, i) => {
                if (!bg) return;
                let speed = [0.15, 0.4, 0.7][i];
                let x = -(lerpCameraX * speed) % canvas.width;
                ctx.drawImage(bg, x, 0, canvas.width, canvas.height);
                ctx.drawImage(bg, x + canvas.width, 0, canvas.width, canvas.height);
                if (x > 0) ctx.drawImage(bg, x - canvas.width, 0, canvas.width, canvas.height);
            });

            platforms.forEach(p => {
                if (platformImg) ctx.drawImage(platformImg, p.x - lerpCameraX, p.y, p.w, p.h);
                else { ctx.fillStyle = "#1a1a1a"; ctx.fillRect(p.x - lerpCameraX, p.y, p.w, p.h); }
            });

            resumeBlocks.forEach(b => {
                ctx.save(); ctx.translate(0, b.offset);
                ctx.fillStyle = b.hit ? "#222" : "#FFD700";
                ctx.fillRect(b.x - lerpCameraX, b.y, 60, 60);
                if (!b.hit) { ctx.fillStyle = "#000"; ctx.font = "bold 30px Arial"; ctx.fillText("?", b.x - lerpCameraX + 18, b.y + 42); }
                ctx.restore();
            });

            // Салют
            fireworks.forEach(f => {
                ctx.globalAlpha = f.life;
                ctx.fillStyle = f.color;
                ctx.fillRect(f.x, f.y, 4, 4);
            });
            ctx.globalAlpha = 1.0;

            // Игрок
            let img = sprites.idle;
            if (!player.grounded) img = (player.vy < 0) ? sprites.jump : sprites.fall;
            else if (Math.abs(player.vx) > 0.5 || isFinished) {
                player.frame += 0.2;
                img = sprites.run[Math.floor(player.frame) % 4];
            }

            ctx.save();
            if (player.dir === -1) { ctx.translate(player.x - lerpCameraX + player.w, player.y); ctx.scale(-1, 1); ctx.drawImage(img || new Image(), 0, 0, player.w, player.h); }
            else { ctx.drawImage(img || new Image(), player.x - lerpCameraX, player.y, player.w, player.h); }
            ctx.restore();

            requestAnimationFrame(draw);
        }
        setInterval(update, 1000/60); draw();
    })();
});
</script>
</body>
</html>
