<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive CV | Disvolo Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --sky: #5c94fc;
            --gold: #FFD700;
            --brick: #E67E22;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--sky);
            font-family: 'Press Start 2P', cursive; color: white;
        }

        #game-viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

        /* --- ПАРАЛЛАКС СЛОИ --- */
        .parallax {
            position: absolute; top: 0; left: 0; height: 100%; width: 10000px;
            background-repeat: repeat-x; background-position: bottom left;
            will-change: transform; image-rendering: pixelated;
        }
        #bg1 { background-image: url('bg1.png'); z-index: 1; background-size: contain; }
        #bg2 { background-image: url('bg2.png'); z-index: 2; background-size: contain; }
        #bg3 { background-image: url('bg3.png'); z-index: 3; background-size: contain; }

        /* --- ИГРОВОЙ МИР --- */
        #world { position: absolute; bottom: 0; left: 0; width: 10000px; height: 100%; z-index: 10; }

        #player {
            position: absolute; width: 60px; height: 80px;
            background-image: url('player.png'); background-size: contain;
            background-repeat: no-repeat; background-position: center;
            z-index: 100; will-change: transform; image-rendering: pixelated;
            /* Плавный поворот персонажа */
            transition: transform 0.1s linear;
        }

        .block {
            position: absolute; width: 50px; height: 50px;
            background: var(--brick); border: 4px solid #d35400;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; z-index: 50; box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
        }
        .block.hit { background: #95a5a6; border-color: #7f8c8d; color: #bdc3c7; box-shadow: none; }
        .block-dl { background: var(--gold); border-color: #b8860b; color: #b8860b; }

        .resume-card {
            position: absolute; padding: 15px; background: white;
            border: 3px solid var(--gold); border-radius: 10px;
            width: 280px; font-size: 9px; line-height: 1.6; color: #333;
            z-index: 200; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            100% { transform: translateY(-140px) scale(1); opacity: 1; }
        }

        .ui { position: fixed; top: 20px; left: 20px; z-index: 1000; text-shadow: 2px 2px #000; }
        #ground { position: absolute; bottom: 0; width: 100%; height: 60px; background: #8B4513; border-top: 5px solid #5D2E0C; }
    </style>
</head>
<body>

<div class="ui">
    <div>SCORE: <span id="score-val">2500</span></div>
    <div style="font-size: 8px; margin-top: 10px;">WORLD: 1-DUBAI | [SPACE] JUMP</div>
</div>

<div id="game-viewport">
    <div id="bg1" class="parallax"></div>
    <div id="bg2" class="parallax"></div>
    <div id="bg3" class="parallax"></div>

    <div id="world">
        <div class="block" style="left: 500px; bottom: 220px;" data-info="<strong>EXPERIENCE:</strong><br>Freelance Web Dev (2 years).<br>Expert in Game Mechanics & UI.">?</div>
        <div class="block" style="left: 850px; bottom: 300px;" data-info="<strong>STACK:</strong><br>JS (ES6+), React, Vue.js.<br>Canvas & CSS Animations.">?</div>
        
        <div class="block block-dl" id="dl-block" style="left: 1300px; bottom: 250px;" data-info="<strong>DOWNLOADED!</strong><br>Резюме сохранено в загрузки.">💾</div>
        
        <div id="player" style="left: 100px; bottom: 60px;"></div>
        <div id="ground"></div>
    </div>
</div>

<script>
    const player = document.getElementById('player');
    const world = document.getElementById('world');
    const scoreVal = document.getElementById('score-val');
    const bgs = [document.getElementById('bg1'), document.getElementById('bg2'), document.getElementById('bg3')];
    
    let state = {
        x: 100, y: 60, vy: 0, 
        lastDir: 1, // 1 - вправо, -1 - влево
        isGrounded: true,
        cameraX: 0,
        score: 2500,
        keys: {}
    };

    const config = {
        gravity: 0.8,
        jump: -17,
        speed: 8,
        ground: 60
    };

    window.onkeydown = (e) => state.keys[e.code] = true;
    window.onkeyup = (e) => state.keys[e.code] = false;

    function downloadResume() {
        const link = document.createElement('a');
        link.href = 'resume.pdf'; 
        link.download = 'Disvolo_Resume.pdf';
        link.click();
    }

    function spawnInfo(x, y, text) {
        const card = document.createElement('div');
        card.className = 'resume-card';
        card.style.left = (x - 110) + 'px';
        card.style.bottom = y + 'px';
        card.innerHTML = text;
        world.appendChild(card);
    }

    function update() {
        // Движение и анимация поворота
        if (state.keys['ArrowRight']) { 
            state.x += config.speed; 
            state.lastDir = 1; 
        }
        if (state.keys['ArrowLeft']) { 
            state.x -= config.speed; 
            state.lastDir = -1; 
        }

        // Прыжок
        if (state.keys['Space'] && state.isGrounded) {
            state.vy = config.jump;
            state.isGrounded = false;
        }

        state.vy += config.gravity;
        state.y -= state.vy;

        if (state.y <= config.ground) {
            state.y = config.ground;
            state.vy = 0;
            state.isGrounded = true;
        }

        // Столкновение с блоками
        document.querySelectorAll('.block:not(.hit)').forEach(block => {
            const bx = parseInt(block.style.left);
            const by = parseInt(block.style.bottom);
            
            if (state.x + 40 > bx && state.x < bx + 50 && 
                state.y + 75 >= by && state.y + 75 <= by + 20 && state.vy < 0) {
                state.vy = 5;
                block.classList.add('hit');
                state.score += 500;
                scoreVal.innerText = state.score;
                spawnInfo(bx, by, block.dataset.info);
                if(block.id === 'dl-block') downloadResume();
            }
        });

        // Камера
        const targetCam = state.x - window.innerWidth / 3;
        state.cameraX += (targetCam - state.cameraX) * 0.1;
        
        render();
        requestAnimationFrame(update);
    }

    function render() {
        // 🏃 Анимация: отзеркаливание персонажа
        const flip = state.lastDir === -1 ? 'scaleX(-1)' : 'scaleX(1)';
        player.style.transform = `translate3d(${state.x}px, ${-state.y}px, 0) ${flip}`;
        
        // 🌍 Движение мира
        world.style.transform = `translate3d(${-state.cameraX}px, 0, 0)`;

        // 🖼 ПАРАЛЛАКС: Движение слоев фона с разной скоростью
        bgs[0].style.transform = `translate3d(${-state.cameraX * 0.2}px, 0, 0)`; // Дальний (самый медленный)
        bgs[1].style.transform = `translate3d(${-state.cameraX * 0.5}px, 0, 0)`; // Средний
        bgs[2].style.transform = `translate3d(${-state.cameraX * 0.8}px, 0, 0)`; // Ближний
    }

    update();
</script>
</body>
</html>
