<script>
window.addEventListener("load", () => {

// ===== CANVAS =====
const canvas = document.getElementById("game");
if (!canvas) throw new Error("Canvas not found");

const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== LOAD IMAGES =====
function load(src){
  return new Promise(resolve=>{
    const img = new Image();
    img.src = src;
    img.onload = ()=>resolve(img);
    img.onerror = ()=>resolve(null);
  });
}

(async function(){

// ===== SPRITES =====
const sprites = {
  idle: await load("idle.png"),
  jump: await load("jump.png"),
  fall: await load("fall.png"),
  run: [
    await load("run.png"),
    await load("run1.png"),
    await load("run2.png"),
    await load("run3.png")
  ]
};

const bg = await load("image_2.png");
const platformImg = await load("platform.png");
const coinImg = await load("coin.png");
const enemyImg = await load("enemy.png");

// ===== PLAYER =====
let player = {
  x:100,
  y:100,
  w:64,
  h:64,
  vx:0,
  vy:0,
  gravity:0.6,
  jump:-14,
  grounded:false,
  frame:0,
  dir:1,
  jumps:0,
  maxJumps:2,
  coins:0
};

let keys = {};
let cameraX = 0;
let state = "start";

// ===== WORLD =====
let platforms = [];
for(let i=0;i<40;i++){
  platforms.push({
    x:i*220,
    y:400 + Math.sin(i)*120,
    w:200,
    h:40
  });
}

let coins = [];
for(let i=0;i<25;i++){
  coins.push({
    x:i*300+150,
    y:250,
    size:32,
    taken:false
  });
}

let enemies = [];
for(let i=0;i<15;i++){
  enemies.push({
    x:i*400+200,
    y:350,
    w:50,
    h:50,
    vx:1,
    alive:true
  });
}

// ===== INPUT =====
window.addEventListener("keydown", e=>{
  keys[e.code]=true;

  if(state==="start" && e.code==="Enter") state="game";
  if(state==="gameover" && e.code==="Enter") location.reload();
});

window.addEventListener("keyup", e=>{
  keys[e.code]=false;
});

// ===== UPDATE =====
function update(){

if(state!=="game") return;

player.vx = 0;

if(keys["ArrowRight"]){ player.vx=6; player.dir=1; }
if(keys["ArrowLeft"]){ player.vx=-6; player.dir=-1; }

if(keys["Space"]){
  if(player.jumps < player.maxJumps){
    player.vy = player.jump;
    player.jumps++;
    keys["Space"]=false;
  }
}

player.vy += player.gravity;
player.x += player.vx;
player.y += player.vy;

player.grounded=false;

// collisions platforms
platforms.forEach(p=>{
  if(
    player.x < p.x+p.w &&
    player.x+player.w > p.x &&
    player.y < p.y+p.h &&
    player.y+player.h > p.y
  ){
    if(player.vy > 0){
      player.y = p.y - player.h;
      player.vy = 0;
      player.grounded = true;
      player.jumps = 0;
    }
  }
});

// coins
coins.forEach(c=>{
  if(!c.taken &&
    player.x < c.x+c.size &&
    player.x+player.w > c.x &&
    player.y < c.y+c.size &&
    player.y+player.h > c.y
  ){
    c.taken=true;
    player.coins++;
  }
});

// enemies
enemies.forEach(e=>{
  if(!e.alive) return;

  e.x += e.vx;

  if(
    player.x < e.x+e.w &&
    player.x+player.w > e.x &&
    player.y < e.y+e.h &&
    player.y+player.h > e.y
  ){
    if(player.vy > 0){
      e.alive=false;
      player.vy=-10;
    } else {
      state="gameover";
    }
  }
});

// fall death
if(player.y > canvas.height) state="gameover";

cameraX = player.x - canvas.width/2;
}

// ===== DRAW =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// START SCREEN
if(state==="start"){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  ctx.font="50px Arial";
  ctx.fillText("CYBER MARIO", canvas.width/2-180, canvas.height/2-50);

  ctx.font="25px Arial";
  ctx.fillText("PRESS ENTER", canvas.width/2-110, canvas.height/2+20);
  return;
}

// BACKGROUND
if(bg){
  ctx.drawImage(bg, -cameraX*0.3, 0, canvas.width*2, canvas.height);
}

// PLATFORMS
platforms.forEach(p=>{
  if(platformImg){
    ctx.drawImage(platformImg, p.x-cameraX, p.y, p.w, p.h);
  } else {
    ctx.fillStyle="gray";
    ctx.fillRect(p.x-cameraX, p.y, p.w, p.h);
  }
});

// COINS
coins.forEach(c=>{
  if(!c.taken){
    if(coinImg){
      ctx.drawImage(coinImg, c.x-cameraX, c.y, c.size, c.size);
    } else {
      ctx.fillStyle="yellow";
      ctx.fillRect(c.x-cameraX, c.y, c.size, c.size);
    }
  }
});

// ENEMIES
enemies.forEach(e=>{
  if(e.alive){
    if(enemyImg){
      ctx.drawImage(enemyImg, e.x-cameraX, e.y, e.w, e.h);
    } else {
      ctx.fillStyle="red";
      ctx.fillRect(e.x-cameraX, e.y, e.w, e.h);
    }
  }
});

// PLAYER
let img = sprites.idle;

if(!player.grounded){
  img = player.vy < 0 ? sprites.jump : sprites.fall;
}
else if(player.vx !== 0){
  player.frame += 0.15;
  img = sprites.run[Math.floor(player.frame) % sprites.run.length];
}

ctx.save();

if(player.dir === -1){
  ctx.scale(-1,1);
  if(img){
    ctx.drawImage(img, -(player.x-cameraX)-player.w, player.y, player.w, player.h);
  } else {
    ctx.fillStyle="cyan";
    ctx.fillRect(-(player.x-cameraX)-player.w, player.y, player.w, player.h);
  }
} else {
  if(img){
    ctx.drawImage(img, player.x-cameraX, player.y, player.w, player.h);
  } else {
    ctx.fillStyle="cyan";
    ctx.fillRect(player.x-cameraX, player.y, player.w, player.h);
  }
}

ctx.restore();

// UI
ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Coins: " + player.coins, 20, 30);

// GAME OVER
if(state==="gameover"){
  ctx.fillStyle="red";
  ctx.font="50px Arial";
  ctx.fillText("GAME OVER", canvas.width/2-150, canvas.height/2);
}

}

// ===== LOOP =====
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

})();
});
</script>
