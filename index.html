<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disvolo17 - Cyberpunk Platformer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00f2ff;
            --bg-dark: #050510;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { display: block; image-rendering: pixelated; }

        /* HUD */
        .ui { position: absolute; top: 20px; left: 20px; color: var(--neon-blue); pointer-events: none; z-index: 10; text-shadow: 0 0 10px var(--neon-blue); }
        .score { font-size: 24px; font-weight: bold; }

        /* Модальное окно в стиле "High-Tech" */
        .modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(5, 5, 20, 0.9); border: 2px solid var(--neon-pink);
            padding: 30px; color: white; display: none; z-index: 100;
            width: 320px; text-align: center; border-radius: 5px;
            box-shadow: 0 0 30px var(--neon-pink); backdrop-filter: blur(10px);
        }
        .modal h2 { color: var(--neon-pink); margin-bottom: 15px; }
        
        /* Кнопки управления */
        .controls { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-around; z-index: 20; }
        .btn { width: 70px; height: 70px; background: rgba(0, 242, 255, 0.1); border: 2px solid var(--neon-blue); border-radius: 50%; color: var(--neon-blue); display: flex; align-items: center; justify-content: center; font-size: 24px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui">
        <div class="score">XP: 2500</div>
        <div style="font-size: 12px; opacity: 0.7;">LEVEL: NEON DUBAI</div>
    </div>

    <div id="modal" class="modal">
        <h2 id="m-title">DATA LINK</h2>
        <p id="m-body"></p>
        <button onclick="closeModal()" style="background: var(--neon-pink); border: none; padding: 10px 20px; color: white; cursor: pointer;">CLOSE</button>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <div style="display:flex; gap:20px;">
            <div class="btn" id="l-btn">←</div>
            <div class="btn" id="r-btn">→</div>
        </div>
        <div class="btn" id="j-btn">UP</div>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let cw, ch;

// Данные из твоего резюме
const DATA = {
    exp: { t: "ОПЫТ РАБОТЫ", b: "Фриланс-разработчик (2 года). Создание игр и интерфейсов на JS/React." },
    skills: { t: "SKILLS", b: "HTML5, CSS3, JS, React, Vue.js, Prompt Engineering." },
    contact: { t: "СВЯЗАТЬСЯ", b: "GitHub: disvolo17. Создаю интерактивные цифровые миры." }
};

const state = {
    camX: 0,
    modalOpen: false,
    keys: { l: false, r: false, j: false }
};

const player = {
    x: 100, y: 0, w: 32, h: 48, vx: 0, vy: 0, 
    speed: 6, jump: -15, grounded: false
};

const objects = {
    platforms: [],
    bgElements: [] // Для параллакса
};

function init() {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight;
    player.y = ch - 200;

    // Создаем параллакс фон (башни)
    for(let i=0; i<20; i++) {
        objects.bgElements.push({
            x: i * 300, y: ch - 500, w: 150, h: 500, 
            layer: Math.random() * 0.5, // Скорость движения
            color: `rgba(20, 20, 60, ${Math.random() * 0.5})`
        });
    }

    // Уровень
    objects.platforms.push({x: 0, y: ch - 60, w: 5000, h: 60, type: 'floor'}); // Пол
    objects.platforms.push({x: 400, y: ch - 200, w: 150, h: 20, data: DATA.exp});
    objects.platforms.push({x: 750, y: ch - 350, w: 150, h: 20, data: DATA.skills});
    objects.platforms.push({x: 1200, y: ch - 250, w: 200, h: 20, data: DATA.contact});

    loop();
}

function update() {
    if(state.modalOpen) return;

    // Физика
    if(state.keys.l) player.vx = -player.speed;
    else if(state.keys.r) player.vx = player.speed;
    else player.vx *= 0.8;

    if(state.keys.j && player.grounded) {
        player.vy = player.jump;
        player.grounded = false;
    }

    player.vy += 0.8; // Гравитация
    player.x += player.vx;
    player.y += player.vy;

    // Камера
    state.camX += (player.x - state.camX - cw/3) * 0.1;

    // Коллизии
    player.grounded = false;
    objects.platforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x &&
           player.y + player.h > p.y && player.y < p.y + p.h) {
            if(player.vy > 0) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.grounded = true;
                if(p.data && !p.hit) {
                    showModal(p.data);
                    p.hit = true;
                }
            }
        }
    });

    if(player.y > ch) { player.x = 100; player.y = ch-200; } // Респаун
}

function draw() {
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, cw, ch);

    // 1. Параллакс фон
    objects.bgElements.forEach(el => {
        ctx.fillStyle = el.color;
        ctx.fillRect(el.x - state.camX * el.layer, el.y, el.w, el.h);
        // Окошки в зданиях
        ctx.fillStyle = 'rgba(0, 242, 255, 0.1)';
        ctx.fillRect(el.x - state.camX * el.layer + 20, el.y + 50, 20, 20);
    });

    ctx.save();
    ctx.translate(-state.camX, 0);

    // 2. Платформы (Киберпанк-стиль)
    objects.platforms.forEach(p => {
        // Тело платформы
        ctx.fillStyle = 'rgba(0, 242, 255, 0.05)';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        // Неоновая грань
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f2ff';
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x, p.y, p.w, p.h);
        ctx.shadowBlur = 0;
    });

    // 3. Игрок (Темный силуэт с контуром)
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#ff00ff';
    ctx.fillStyle = '#000';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.strokeStyle = '#ff00ff';
    ctx.strokeRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;

    ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

function showModal(data) {
    state.modalOpen = true;
    document.getElementById('m-title').innerText = data.t;
    document.getElementById('m-body').innerText = data.b;
    document.getElementById('modal').style.display = 'block';
}

function closeModal() {
    state.modalOpen = false;
    document.getElementById('modal').style.display = 'none';
}

// Управление
const bind = (id, k) => {
    const el = document.getElementById(id);
    el.onmousedown = el.ontouchstart = (e) => { e.preventDefault(); state.keys[k] = true; };
    el.onmouseup = el.ontouchend = (e) => { e.preventDefault(); state.keys[k] = false; };
};
bind('l-btn', 'l'); bind('r-btn', 'r'); bind('j-btn', 'j');

window.onload = init;
</script>
</body>
</html>
