<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pixel Resume Game</title>
    <style>
        body { margin: 0; background: #1a1a1a; font-family: 'Courier New', Courier, monospace; overflow: hidden; color: white; }
        canvas { display: block; background: #2d4c2d; margin: 0 auto; image-rendering: pixelated; border: 5px solid #444; }
        #ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
              background: #000; padding: 20px; border: 4px solid #fff; 
              width: 80%; max-width: 600px; display: none; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui-title { font-weight: bold; color: #55ff55; margin-bottom: 10px; border-bottom: 1px solid #333; }
        .hint { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 10px; font-size: 14px; border: 1px solid #555; }
    </style>
</head>
<body>

<div class="hint">🎮 <b>Управление:</b> WASD или СТРЕЛКИ<br>💬 <b>Взаимодействие:</b> ПРОБЕЛ рядом с объектами</div>
<div id="ui">
    <div id="ui-title"></div>
    <div id="ui-content" style="white-space: pre-wrap; line-height: 1.4;"></div>
    <div style="font-size: 11px; margin-top: 15px; color: #777; text-align: right;">[Нажми ПРОБЕЛ, чтобы закрыть]</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/** * СЮДА ВСТАВЬТЕ СВОИ ДАННЫЕ ВМЕСТО ПРИМЕРОВ:
 */
const RESUME_DATA = {
    intro: {
        title: "КТО Я? (ОБО МНЕ)",
        text: "Привет! Я disvolo17. \nЯ создаю цифровые миры и интерфейсы. \nДобро пожаловать в мое резюме-игру!"
    },
    skills: {
        title: "МОЙ СТЕК ТЕХНОЛОГИЙ",
        text: "• Frontend: HTML5, CSS3, JavaScript\n• Frameworks: React, Bootstrap\n• Tools: Git, GitHub Pages, VS Code\n• Graphics: Pixel Art, Figma"
    },
    experience: {
        title: "ОПЫТ РАБОТЫ",
        text: "— Проект A: Разработка лендингов\n— Проект B: Создание интерактивных карт\n— Фриланс: Помощь в автоматизации процессов"
    },
    contacts: {
        title: "СВЯЗАТЬСЯ СО МНОЙ",
        text: "GitHub: https://github.com/disvolo17\nСайт: disvolo17.github.io\nEmail: (ваш email здесь)"
    }
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const uiTitle = document.getElementById('ui-title');
const uiContent = document.getElementById('ui-content');

canvas.width = 800;
canvas.height = 600;

const player = { x: 400, y: 300, size: 24, speed: 5, color: '#00ff00' };
const keys = {};
let activeDialog = null;

// Объекты на карте
const points = [
    { x: 200, y: 150, size: 30, color: '#ff4444', label: 'ПРИВЕТСТВИЕ', data: RESUME_DATA.intro },
    { x: 600, y: 150, size: 30, color: '#4444ff', label: 'НАВЫКИ', data: RESUME_DATA.skills },
    { x: 200, y: 450, size: 30, color: '#ffff44', label: 'ОПЫТ', data: RESUME_DATA.experience },
    { x: 600, y: 450, size: 30, color: '#ff44ff', label: 'КОНТАКТЫ', data: RESUME_DATA.contacts },
];

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') {
        if (activeDialog) {
            activeDialog = null;
            ui.style.display = 'none';
        } else {
            points.forEach(p => {
                const dist = Math.hypot(player.x - p.x, player.y - p.y);
                if (dist < 50) {
                    activeDialog = p.data;
                    uiTitle.innerText = p.data.title;
                    uiContent.innerText = p.data.text;
                    ui.style.display = 'block';
                }
            });
        }
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    if (activeDialog) return;

    if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
    if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;

    player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Сетка земли
    ctx.strokeStyle = '#355a35';
    for(let i=0; i<canvas.width; i+=40) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
    }
    for(let i=0; i<canvas.height; i+=40) {
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
    }

    // Рисуем интерактивные блоки
    points.forEach(p => {
        // Тень
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(p.x - 12, p.y + 10, 30, 15);
        
        // Блок
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
        
        ctx.fillStyle = 'white';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(p.label, p.x, p.y - 25);
        
        const dist = Math.hypot(player.x - p.x, player.y - p.y);
        if (dist < 50) {
            ctx.fillStyle = '#55ff55';
            ctx.fillText("[ПРОБЕЛ]", p.x, p.y + 35);
        }
    });

    // Рисуем игрока
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.size, player.size);
    // Лицо
    ctx.fillStyle = 'black';
    ctx.fillRect(player.x + 4, player.y + 6, 4, 4);
    ctx.fillRect(player.x + 16, player.y + 6, 4, 4);

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

draw();
</script>
</body>
</html>
