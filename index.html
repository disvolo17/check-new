<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denis - PM Dubai Action Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Press Start 2P', cursive; touch-action: manipulation; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; }
        #lives { color: #ff0000; font-size: 20px; text-shadow: 2px 2px #000; }
        #boss-bar { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 300px; height: 15px; border: 3px solid #fff; display: none; background: #222; }
        #boss-hp { width: 100%; height: 100%; background: #f00; transition: width 0.2s; }
        #joke-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); color: #00ff00; display: none; 
            align-items: center; justify-content: center; text-align: center; 
            font-size: 20px; padding: 40px; z-index: 100; text-transform: uppercase; line-height: 1.6;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="lives">ЖИЗНИ: ♥♥♥</div>
    <div id="boss-bar"><div id="boss-hp"></div></div>
</div>
<div id="joke-overlay">АНЕКДОТ</div>
<canvas id="game"></canvas>

<script>
window.addEventListener("load", () => {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const jokeOverlay = document.getElementById("joke-overlay");

    const jokes = [
        "ПРОДЖЕКТ-МЕНЕДЖЕР — ЭТО ЧЕЛОВЕК, КОТОРЫЙ СЧИТАЕТ, ЧТО 9 ЖЕНЩИН МОГУТ РОДИТЬ РЕБЕНКА ЗА МЕСЯЦ!",
        "ЗАКАЗЧИК: 'МЫ ХОТИМ ВСЁ И ВЧЕРА'. ПМ: 'ВОТ ВАМ СЧЕТ И ГАЛЛЮЦИНАЦИЯ БЭКЛОГА!'",
        "ДЕБАТЫ ПМ-А: 'МЫ НЕ ОПАЗДЫВАЕМ, МЫ ПРОСТО ПЕРЕОСМЫСЛИВАЕМ ПОНЯТИЕ ВРЕМЕНИ!'",
        "БЭКЛОГ — ЭТО КЛАДБИЩЕ ХОРОШИХ ИДЕЙ, КОТОРЫЕ УБИЛ БЮДЖЕТ!"
    ];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function load(src) {
        return new Promise(res => {
            const img = new Image();
            img.src = src;
            img.onload = () => res(img);
            img.onerror = () => res(null);
        });
    }

    (async function() {
        const sprites = {
            idle: await load("idle.png"),
            runSheet: await load("run_sheet.png"),
            jumpSheet: await load("jump_sheet.png"),
            little: await load("Little.png"),
            big: await load("big.png")
        };
        const bgs = [await load("bg1.png"), await load("bg2.png"), await load("bg3.png")];

        const GROUND_Y = canvas.height - 120;
        const FINISH_LINE_X = 6500;

        let player = {
            x: 150, y: GROUND_Y - 140, w: 80, h: 140, 
            vx: 0, vy: 0, accel: 0.8, friction: 0.85, maxSpeed: 7, gravity: 0.8, jumpPower: -19,
            grounded: false, jumps: 0, maxJumps: 2, frame: 0, dir: 1, lives: 3,
            state: 'idle', breathTimer: 0
        };

        // Настройки сетки спрайтов (4 колонки, 3 ряда для бега)
        const anim = {
            run: { cols: 4, rows: 3, total: 12, speed: 0.2 },
            jump: { cols: 4, rows: 2, total: 8, speed: 0.15 }
        };

        let bullets = []; let fireballs = []; let enemies = [];
        let boss = { x: 5500, y: GROUND_Y - 220, w: 220, h: 220, vx: -2.5, vy: 0, hp: 10, active: false, shotTimer: 0 };
        let lerpCameraX = 0;
        let keys = { a: false, d: false };

        let jokeBlocks = [{ x: 900, y: GROUND_Y - 280, hit: false }, { x: 2500, y: GROUND_Y - 280, hit: false }, { x: 4100, y: GROUND_Y - 280, hit: false }];
        let cvBlock = { x: 4800, y: GROUND_Y - 280, hit: false };

        for(let i=0; i<5; i++) enemies.push({ x: 1200 + i*1100, y: GROUND_Y - 90, w: 90, h: 90, vx: -3, alive: true });

        window.addEventListener("keydown", e => {
            if (e.code === "KeyA") keys.a = true;
            if (e.code === "KeyD") keys.d = true;
            if (e.code === "KeyW" && player.jumps < player.maxJumps) { player.vy = player.jumpPower; player.jumps++; player.grounded = false; player.frame = 0; }
            if (e.code === "Space") bullets.push({ x: player.x + (player.dir === 1 ? player.w : 0), y: player.y + 60, vx: player.dir * 14 });
        });
        window.addEventListener("keyup", e => { if (e.code === "KeyA") keys.a = false; if (e.code === "KeyD") keys.d = false; });

        function update() {
            if (player.lives <= 0) return;
            if (keys.a) { player.vx -= player.accel; player.dir = -1; } else if (keys.d) { player.vx += player.accel; player.dir = 1; } else { player.vx *= player.friction; }
            if (Math.abs(player.vx) < 0.2) player.vx = 0;
            player.vy += player.gravity; player.x += player.vx; player.y += player.vy;
            if (player.y + player.h > GROUND_Y) { player.y = GROUND_Y - player.h; player.vy = 0; player.grounded = true; player.jumps = 0; } else { player.grounded = false; }

            player.state = !player.grounded ? 'jump' : (player.vx !== 0 ? 'run' : 'idle');

            jokeBlocks.forEach(b => {
                if (!b.hit && player.x + player.w > b.x && player.x < b.x + 80 && player.vy < 0 && player.y < b.y + 80 && player.y > b.y) {
                    b.hit = true; player.vy = 6; jokeOverlay.innerText = jokes[Math.floor(Math.random() * jokes.length)];
                    jokeOverlay.style.display = "flex"; setTimeout(() => jokeOverlay.style.display = "none", 3000);
                }
            });

            if (!cvBlock.hit && player.x + player.w > cvBlock.x && player.x < cvBlock.x + 80 && player.vy < 0 && player.y < cvBlock.y + 80 && player.y > cvBlock.y) {
                cvBlock.hit = true; player.vy = 6; const link = document.createElement('a'); link.href = 'resume.pdf'; link.download = 'Denis_CV.pdf'; link.click();
            }

            enemies.forEach(en => { if (!en.alive) return; en.x += en.vx; if (en.x < 100 || en.x > 6000) en.vx *= -1; if (player.x + player.w > en.x && player.x < en.x + en.w && player.y + player.h > en.y && player.y < en.y + en.h) { player.lives--; player.x -= 150; document.getElementById("lives").innerText = "ЖИЗНИ: " + "♥".repeat(Math.max(0, player.lives)); if(player.lives <= 0) location.reload(); } });
            if (player.x > 5000) boss.active = true;
            if (player.x > FINISH_LINE_X) window.location.href = "https://disvolo17.github.io/work/";
            lerpCameraX += (player.x - canvas.width / 2 - lerpCameraX) * 0.08;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bgs.forEach((bg, i) => { if (!bg) return; let x = -(lerpCameraX * [0.1, 0.3, 0.6][i]) % canvas.width; ctx.drawImage(bg, x, 0, canvas.width, canvas.height); ctx.drawImage(bg, x + canvas.width, 0, canvas.width, canvas.height); });
            ctx.fillStyle = "#3d2516"; ctx.fillRect(0, GROUND_Y, canvas.width, 120); ctx.fillStyle = "#2ecc71"; ctx.fillRect(0, GROUND_Y, canvas.width, 15);
            jokeBlocks.forEach(b => { ctx.fillStyle = b.hit ? "#333" : "#f1c40f"; ctx.fillRect(b.x - lerpCameraX, b.y, 80, 80); });
            ctx.fillStyle = "#3498db"; ctx.fillRect(cvBlock.x - lerpCameraX, cvBlock.y, 80, 80);
            enemies.forEach(en => { if (en.alive && sprites.little) ctx.drawImage(sprites.little, en.x - lerpCameraX, en.y, en.w, en.h); });

            // ОТРИСОВКА ГЕРОЯ С ПОДДЕРЖКОЙ СЕТКИ (GRID)
            ctx.save();
            ctx.translate(player.x - lerpCameraX, player.y);
            if (player.dir === -1) { ctx.scale(-1, 1); ctx.translate(-player.w, 0); }

            if (player.state === 'idle') {
                player.breathTimer += 0.05;
                let breathH = player.h + Math.sin(player.breathTimer) * 2;
                ctx.drawImage(sprites.idle, 0, player.h - breathH, player.w, breathH);
            } else {
                let current = player.state === 'run' ? anim.run : anim.jump;
                let sheet = player.state === 'run' ? sprites.runSheet : sprites.jumpSheet;
                
                player.frame += current.speed;
                let frameIdx = Math.floor(player.frame) % current.total;
                if (player.state === 'jump' && player.frame >= current.total) frameIdx = current.total - 1;

                // Вычисляем координаты кадра в сетке
                let frameW = sheet.width / current.cols;
                let frameH = sheet.height / current.rows;
                let col = frameIdx % current.cols;
                let row = Math.floor(frameIdx / current.cols);

                ctx.drawImage(sheet, col * frameW, row * frameH, frameW, frameH, 0, 0, player.w, player.h);
            }
            ctx.restore();

            requestAnimationFrame(draw);
        }
            
        setInterval(update, 1000/60);
        draw();
    })();
});
</script>
</body>
</html>
